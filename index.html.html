        <div class="field"><label>Fin ${i+1}</label><input id="per-fin-${i}" type="date" value="${p.fin||''}"/></div>
        <div class="field"><label>Meses ${i+1}</label><input id="per-mes-${i}" type="number" value="${p.meses||''}"/></div>
      </div>`).join('')}
    </div>
    <button class="btn btn-secondary btn-sm" onclick="addPeriodo()" style="margin-top:6px">+ Añadir renovación</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarContrato(${id||0})">💾 Guardar</button>
    </div>`);
  window._perCount=periodos.length||0;
  if(!periodos.length) { window._perCount=1; document.getElementById('periodos-container').innerHTML=`
    <div class="row3" id="per-0">
      <div class="field"><label>Inicio 1</label><input id="per-ini-0" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="field"><label>Fin 1</label><input id="per-fin-0" type="date"/></div>
      <div class="field"><label>Meses 1</label><input id="per-mes-0" type="number"/></div>
    </div>`; }
  window.addPeriodo=()=>{
    const i=window._perCount++;
    const cont=document.getElementById('periodos-container');
    const d=document.createElement('div'); d.className='row3'; d.id='per-'+i;
    d.innerHTML=`<div class="field"><label>Inicio ${i+1}</label><input id="per-ini-${i}" type="date"/></div><div class="field"><label>Fin ${i+1}</label><input id="per-fin-${i}" type="date"/></div><div class="field"><label>Meses ${i+1}</label><input id="per-mes-${i}" type="number"/></div>`;
    cont.appendChild(d);
  };
}

function guardarContrato(id){
  const ref=document.getElementById('fc-ref').value.trim();
  if(!ref){toast('La referencia es obligatoria');return;}
  const periodos=[];
  for(let i=0;i<window._perCount;i++){
    const ini=document.getElementById('per-ini-'+i);
    const fin=document.getElementById('per-fin-'+i);
    const mes=document.getElementById('per-mes-'+i);
    if(fin&&fin.value) periodos.push({inicio:ini?ini.value:'',fin:fin.value,meses:mes?parseInt(mes.value)||'':''});
  }
  if(!periodos.length){toast('Añade al menos un periodo con fecha de fin');return;}
  if(!DB.contratos) DB.contratos=[];
  if(id){
    const c=DB.contratos.find(x=>x.id===id);
    c.ref=ref; c.periodos=periodos;
  } else {
    DB.contratos.push({id:newId('contratos'),ref,periodos});
  }
  saveDB();closeModal();contratos();toast(id?'Contrato actualizado ✓':'Contrato creado ✓');
}

function eliminarContrato(id){
  if(!confirm('¿Eliminar este contrato?'))return;
  DB.contratos=DB.contratos.filter(x=>x.id!==id);
  saveDB();contratos();toast('Contrato eliminado');
}

  // ── BUSCAR POR REF CATASTRAL O CÓDIGO CRM ──────────────────────────────────
  window.vlBuscarRef = function(){
    var ref = (document.getElementById('vl-refcat').value||'').trim();
    if(!ref) return;
    var infoEl = document.getElementById('vl-ref-info');

    // Search in all CRM arrays
    var allInm = [].concat(DB.inmuebles||[], DB.cobros||[], DB.captaciones||[]);
    var found = allInm.find(function(i){
      return (i.ref_cat||'').toLowerCase()===ref.toLowerCase()
          || (i.ref||'').toLowerCase()===ref.toLowerCase();
    });

    if(found){
      // Prefill form
      var loc = found.loc_inm || found.localidad || '';
      var tip = found.tipologia || 'casas';
      var tipMap = {'Casa':'casas','Piso':'pisos','Duplex':'duplex','Local':'solares','Terreno':'rustico'};
      var tipVal = tipMap[tip] || 'casas';

      document.getElementById('vl-loc').value = loc;
      document.getElementById('vl-tipo').value = tipVal;
      if(found.m2) document.getElementById('vl-m2').value = found.m2;
      if(found.dorm) document.getElementById('vl-dorm').value = found.dorm;
      if(found.banos) document.getElementById('vl-banos').value = found.banos;
      if(found.garaje) document.getElementById('vl-garaje').value = found.garaje==='Si'?'SI':'NO';
      if(found.trastero) document.getElementById('vl-trastero').value = found.trastero==='Si'?'SI':'NO';
      if(found.terraza && found.terraza!=='No') document.getElementById('vl-terraza').value = 'SI';
      if(found.calef && found.calef!=='No') document.getElementById('vl-calef').value = 'SI';
      if(found.prop_nombre||found.nombre) document.getElementById('vl-propietario').value = (found.prop_nombre||found.nombre||'')+' '+(found.prop_apellidos||found.apellidos||'');
      if(found.dir_inm||found.dir) document.getElementById('vl-dir').value = found.dir_inm||found.dir||'';
      if(found.obs) document.getElementById('vl-obs').value = found.obs;

      vlToggleExtras();

      infoEl.style.display='block';
      infoEl.innerHTML = '✅ Inmueble encontrado: <strong>'+(found.ref||ref)+'</strong> · '+(found.prop_nombre||found.nombre||'')+' · '+loc+' · '+(found.m2||'-')+' m²';
      vlCalc();
    } else {
      infoEl.style.display='block';
      infoEl.style.background='var(--orange-light)';
      infoEl.style.color='var(--orange)';
      infoEl.innerHTML = '⚠️ No se encontró el inmueble con referencia <strong>'+ref+'</strong>. Rellena los datos manualmente.';
    }
  };

  // ── TOGGLE EXTRAS ─────────────────────────────────────────────────────────
  window.vlToggleExtras = function(){
    var tipo = document.getElementById('vl-tipo').value;
    var sec = document.getElementById('vl-extras-section');
    if(sec) sec.style.display = (tipo==='solares'||tipo==='rustico') ? 'none' : 'block';
  };

  // ── AÑADIR TESTIGO MANUAL ─────────────────────────────────────────────────
  window.vlAddTestigo = function(){
    var idx = testigos.length;
    testigos.push({ref:'', loc:'', tipo:'', m2:'', precio:'', fuente:'Idealista', url:''});

  };

  window.vlRenderTestigos = function(){
    var cont = document.getElementById('vl-testigos-list');
    if(!cont) return;
    if(!testigos.length){ cont.innerHTML=''; return; }
    cont.innerHTML = testigos.map(function(t,i){
      return '<div style="background:var(--surface2);border-radius:var(--radius);padding:10px;margin-bottom:8px;border:1px solid var(--border)">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'

  // ── CALCULAR ───────────────────────────────────────────────────────────────
  window.vlCalc = function(){
    var loc = (document.getElementById('vl-loc').value||'').trim();
    var tipo = document.getElementById('vl-tipo').value;
    var m2 = parseFloat(document.getElementById('vl-m2').value)||0;
    var res = document.getElementById('vl-resultado');
    if(!res) return;

    if(!loc || !m2){
      res.style.cssText='display:flex;align-items:center;justify-content:center;min-height:300px';
      res.innerHTML='<div style="text-align:center;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px">📊</div><div style="font-size:14px;font-weight:600">Introduce la localidad y los m²<br/>para obtener la valoración</div></div>';
      return;
    }

    var dataKey = (tipo==='pisos'||tipo==='duplex') ? 'pisos' : tipo==='casas' ? 'casas' : tipo==='solares' ? 'solares' : 'rustico';
    if(!VALDATA2[dataKey]||!VALDATA2[dataKey][loc]){
      res.style.cssText='display:block;padding:2rem';
      res.innerHTML='<div style="text-align:center"><div style="font-size:32px;margin-bottom:8px">🔍</div>'
        +'<div style="color:var(--red);font-weight:600">No hay datos para <strong>'+loc+'</strong></div>'
        +'<div style="font-size:12px;color:var(--text3);margin-top:6px">Comprueba el nombre del municipio</div></div>';
      return;
    }

    var d = VALDATA2[dataKey][loc];
    var precioBase, precioMin, precioMax, labelTipo, totalCoef=0, coefLines=[];

    if(tipo==='solares'){
      precioBase=d.medio; precioMin=d.min; precioMax=d.max; labelTipo='Solar urbano';
    } else if(tipo==='rustico'){
      precioBase=d.medio; precioMin=d.medio*0.6; precioMax=d.medio*1.4; labelTipo='Suelo rústico';
    } else {
      labelTipo = tipo==='casas'?'Casa':tipo==='pisos'?'Piso':'Duplex';
      var ckey = tipo==='casas'?'casas':'pisos';
      precioBase=d.real; precioMin=d.min; precioMax=d.max;
      var C = VALCOEFS2[ckey];
      var estado=document.getElementById('vl-estado').value;
      var garaje=document.getElementById('vl-garaje').value;
      var trastero=document.getElementById('vl-trastero').value;
      var terraza=document.getElementById('vl-terraza').value;
      var calef=document.getElementById('vl-calef').value;
      var dorm=document.getElementById('vl-dorm').value;
      var banos=document.getElementById('vl-banos').value;
      var aire=document.getElementById('vl-aire').value;
      var extras2=document.getElementById('vl-extras2').value;
      function addC(lbl,v){if(v!==0){totalCoef+=v;coefLines.push({label:lbl,val:v});}}
      addC('Estado: '+estado, C.estado[estado]||0);
      addC('Garaje', tipo==='casas'?(garaje==='SI'?C.garaje['Misma Casa']:0):(garaje==='SI'?C.garaje['Mismo edificio']:0));
      addC('Trastero', C.trastero[trastero]||0);
      addC('Terraza', C.terraza[terraza]||0);
      addC('Calefacción', C.calefaccion[calef]||0);
      addC('Dormitorios: '+dorm, C.dormitorios[dorm]||0);
      addC('Baños: '+banos, C.banos[banos]||0);
      addC('Aire acond.', C.aire[aire]||0);
      addC('Otros extras', C.extras[extras2]||0);
      precioBase = precioBase*(1+totalCoef);
    }

    var vm=Math.round(m2*precioBase);
    var vr=Math.round(vm*0.9);
    var va=Math.round(vm*1.1);
    var vmin=Math.round(m2*precioMin);
    var vmax=Math.round(m2*precioMax);
    var pctGauge=Math.min(100,Math.max(0,Math.round((precioBase/(1+totalCoef||1e-9)-precioMin)/(precioMax-precioMin)*100)));

    // CRM testigos (similar inmuebles)
    var crmTestigos = [];
    var allInm = [].concat(DB.inmuebles||[],DB.cobros||[],DB.captaciones||[]);
    var crmDataKey = tipo==='casas'?'casas':'pisos';
    allInm.forEach(function(inm){
      var inmloc = inm.loc_inm||inm.localidad||'';
      var inmtip = inm.tipologia||'';
      var inmm2 = parseFloat(inm.m2)||0;
      if(!inmm2) return;
      var tipMatch = (tipo==='casas'&&inmtip==='Casa')||(tipo==='pisos'&&inmtip==='Piso')||(tipo==='duplex'&&inmtip==='Duplex')||(tipo==='solares'&&inmtip==='Local')||(tipo==='rustico'&&inmtip==='Terreno');
      if(!tipMatch) return;
      // Look up price from historial or estimate
      var hp = (DB.historial_precios||[]).find(function(h){return h.ref===inm.ref;});
      var precio = 0;
      if(hp&&hp.cambios.length){
        var ult = hp.cambios.slice().sort(function(a,b){return a.fecha>b.fecha?1:-1;}).pop();
        precio = (ult.propietario||0)+(ult.innova||0);
      }
      if(!precio) return;
      var ppm = Math.round(precio/inmm2);
      crmTestigos.push({
        ref:inm.ref, loc:inmloc, tipo:inmtip, m2:inmm2,
        precio:precio, ppm:ppm, fuente:'CRM Innova LM',
        prop:(inm.prop_nombre||inm.nombre||'')+' '+(inm.prop_apellidos||inm.apellidos||'')
      });
    });
    // Sort by proximity of ppm to our estimate
    crmTestigos.sort(function(a,b){return Math.abs(a.ppm-precioBase)-Math.abs(b.ppm-precioBase);});
    crmTestigos = crmTestigos.slice(0,5);

    // Comparables chart (nearby municipalities)
    var compKey = tipo==='casas'?'casas':'pisos';
    var allMunis = Object.keys(VALDATA2[compKey]||{});
    var baseReal = precioBase/(1+(totalCoef||1e-9));
    if(Math.abs(totalCoef)<0.001) baseReal=precioBase;
    var comparables = allMunis.filter(function(m){return m!==loc;}).sort(function(a,b){
      return Math.abs(VALDATA2[compKey][a].real-baseReal)-Math.abs(VALDATA2[compKey][b].real-baseReal);
    }).slice(0,5);
    var chartData = [{mun:loc,val:Math.round(baseReal),isMain:true}];
    comparables.forEach(function(m){chartData.push({mun:m,val:VALDATA2[compKey][m].real,isMain:false});});
    chartData.sort(function(a,b){return b.val-a.val;});
    var maxVal = Math.max.apply(null,chartData.map(function(d){return d.val;}));

    var fmt = function(n){return Math.round(n).toLocaleString('es-ES')+' €';};
    var fmtp = function(n){return Math.round(n)+' €/m²';};

    window._vlResult = {tipo:labelTipo,tipoKey:tipo,loc,m2,precioBase,totalCoef,coefLines,
      vmercado:vm,vrapido:vr,vanuncio:va,vmin,vmax,pctGauge,chartData,maxVal,crmTestigos,
      estado:document.getElementById('vl-estado')?document.getElementById('vl-estado').value:'',
      dorm:document.getElementById('vl-dorm')?document.getElementById('vl-dorm').value:'',
      banos:document.getElementById('vl-banos')?document.getElementById('vl-banos').value:''};

    var html = '<div style="display:flex;flex-direction:column;gap:1rem">';

    // Price cards
    html += '<div>'
      +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">'
        +'💰 Valoración — <span style="color:var(--accent)">'+loc+' · '+labelTipo+' · '+m2+' m²</span>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">'
        +'<div style="background:var(--accent-light);border:2px solid var(--accent);border-radius:var(--radius);padding:12px;text-align:center">'
          +'<div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:5px">💰 Valor Mercado</div>'
          +'<input id="vl-edit-mercado" type="text" value="'+vm.toLocaleString('es-ES')+'" style="width:100%;text-align:center;font-size:18px;font-weight:800;border:none;background:transparent;color:var(--text);outline:none"/>'
          +'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+fmtp(precioBase)+'</div>'
        +'</div>'
        +'<div style="background:var(--orange-light);border:1px solid var(--orange);border-radius:var(--radius);padding:12px;text-align:center">'
          +'<div style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;margin-bottom:5px">⚡ Venta Rápida</div>'
          +'<input id="vl-edit-rapido" type="text" value="'+vr.toLocaleString('es-ES')+'" style="width:100%;text-align:center;font-size:18px;font-weight:800;border:none;background:transparent;color:var(--text);outline:none"/>'
          +'<div style="font-size:11px;color:var(--text3);margin-top:2px">-10% mercado</div>'
        +'</div>'
        +'<div style="background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius);padding:12px;text-align:center">'
          +'<div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:5px">📢 Precio Anuncio</div>'
          +'<input id="vl-edit-anuncio" type="text" value="'+va.toLocaleString('es-ES')+'" style="width:100%;text-align:center;font-size:18px;font-weight:800;border:none;background:transparent;color:var(--text);outline:none"/>'
          +'<div style="font-size:11px;color:var(--text3);margin-top:2px">+10% mercado</div>'
        +'</div>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--text3);text-align:center;margin-top:5px">✏️ Edita los precios directamente · Rango zona: <strong>'+fmt(vmin)+'</strong> — <strong>'+fmt(vmax)+'</strong></div>'
    +'</div>';

    // Ajustes
    if(coefLines.length){
      html+='<div style="background:var(--surface2);border-radius:var(--radius);padding:10px 14px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Ajustes · Total: <span style="color:'+(totalCoef>0?'var(--green)':'var(--red)')+'">'+((totalCoef>0?'+':'')+(totalCoef*100).toFixed(1))+'%</span></div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px">';
      coefLines.forEach(function(c){
        html+='<span style="background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px 10px;font-size:11px">'+c.label+' <strong style="color:'+(c.val>0?'var(--green)':'var(--red)')+'">'+((c.val>0?'+':'')+(c.val*100).toFixed(1))+'%</strong></span>';
      });
      html+='</div></div>';
    }

    // Comparativa municipal
    if(tipo!=='solares'&&tipo!=='rustico'){
      html+='<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:10px">📊 Comparativa municipal · €/m²</div>';
      chartData.forEach(function(d){
        var pct=Math.round((d.val/maxVal)*100);
        html+='<div style="margin-bottom:7px">'
          +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">'
            +'<span style="font-weight:'+(d.isMain?700:400)+';color:'+(d.isMain?'var(--accent)':'var(--text2)')+'">'+d.mun+(d.isMain?' ★':'')+'</span>'
            +'<span style="font-weight:600">'+d.val+' €/m²</span>'
          +'</div>'
          +'<div style="background:var(--border);border-radius:99px;height:7px">'
            +'<div style="width:'+pct+'%;background:'+(d.isMain?'linear-gradient(90deg,#185FA5,#1a7fc4)':'#cbd5e1')+';border-radius:99px;height:7px"></div>'
          +'</div>'
        +'</div>';
      });
      html+='</div>';
    }

    // Gauge
    html+='<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:10px">📏 Posición en el mercado de '+loc+'</div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px"><span>Mínimo '+fmtp(precioMin)+'</span><span>Máximo '+fmtp(precioMax)+'</span></div>'
      +'<div style="background:linear-gradient(90deg,#dcfce7,#fef3c7,#fee2e2);border-radius:99px;height:14px;position:relative">'
        +'<div style="position:absolute;left:'+pctGauge+'%;top:-5px;transform:translateX(-50%);width:24px;height:24px;background:var(--accent);border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.2)"></div>'
      +'</div>'
      +'<div style="text-align:center;font-size:11px;color:var(--accent);font-weight:600;margin-top:10px">Precio estimado: '+fmtp(precioBase)+' · Percentil '+pctGauge+'%</div>'
    +'</div>';

    // CRM testigos
    if(crmTestigos.length){
      html+='<div style="background:var(--surface2);border-radius:var(--radius);padding:12px 14px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:8px">🏘️ Testigos del CRM ('+crmTestigos.length+')</div>'
        +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
          +'<thead><tr style="border-bottom:1px solid var(--border)">'
            +'<th style="text-align:left;padding:4px 8px;font-size:10px;color:var(--text3)">Ref</th>'
            +'<th style="text-align:left;padding:4px 8px;font-size:10px;color:var(--text3)">Localidad</th>'
            +'<th style="text-align:right;padding:4px 8px;font-size:10px;color:var(--text3)">m²</th>'
            +'<th style="text-align:right;padding:4px 8px;font-size:10px;color:var(--text3)">Precio</th>'
            +'<th style="text-align:right;padding:4px 8px;font-size:10px;color:var(--text3)">€/m²</th>'
          +'</tr></thead><tbody>';
      crmTestigos.forEach(function(t){
        html+='<tr style="border-bottom:1px solid var(--border)">'
          +'<td style="padding:5px 8px;font-weight:600;color:var(--accent)">'+t.ref+'</td>'
          +'<td style="padding:5px 8px;color:var(--text2)">'+t.loc+'</td>'
          +'<td style="padding:5px 8px;text-align:right;color:var(--text3)">'+t.m2+' m²</td>'
          +'<td style="padding:5px 8px;text-align:right;font-weight:600">'+t.precio.toLocaleString('es-ES')+' €</td>'
          +'<td style="padding:5px 8px;text-align:right;color:var(--accent);font-weight:700">'+t.ppm+' €/m²</td>'
        +'</tr>';
      });
      html+='</tbody></table></div>';
    } else {
      html+='<div style="background:var(--surface2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--text3)">🏘️ No hay testigos disponibles en el CRM para esta tipología y zona. Añade testigos manuales en el panel izquierdo.</div>';
    }

    html+='<button class="btn btn-primary" style="width:100%" onclick="vlGenerarInforme()">📄 Generar informe PDF</button>';
    html+='</div>';

    res.style.cssText='display:block;padding:1.5rem';
    res.innerHTML=html;
  };

            <td>${i.prop_nombre||i.nombre||''} ${i.prop_apellidos||i.apellidos||''}</td>
            <td>${i.telefono||'-'}</td>
            <td>${i.dir_inm||i.dir||'-'}</td>
            <td>${i.loc_inm||i.localidad||'-'}</td>
            <td>${i.m2||'-'}</td>
            <td>${fmtFecha(i.fecha_baja)}</td>
            <td><div class="td-actions">
              <button class="btn btn-secondary btn-sm btn-icon" onclick="verFichaInmueble('${i.ref}')" title="Ver ficha">👁️</button>
              <button class="btn btn-primary btn-sm" onclick="reactivarBaja('${i.ref}')" title="Reactivar en Inmuebles" style="font-size:11px">↩️ Reactivar</button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="eliminarBaja('${i.ref}')" title="Eliminar definitivamente">🗑️</button>
            </div></td>

      `<div class="empty-state"><div class="empty-icon">🔻</div><div class="empty-msg">No hay inmuebles dados de baja.</div></div>`}

function reactivarBaja(ref) {
  if(!confirm('¿Reactivar el inmueble '+ref+' y devolverlo a Inmuebles?')) return;
  const b = (DB.bajas||[]).find(x=>x.ref===ref);
  if(!b){ toast('No se encontró el inmueble en Bajas'); return; }
  // Restore to inmuebles with En Activo state
  const inmObj = Object.assign({}, b);
  inmObj.id = newId('inmuebles');
  inmObj.estado = 'En Activo';
  delete inmObj.id_baja;
  delete inmObj.fecha_baja;
  DB.inmuebles.push(inmObj);
  DB.bajas = (DB.bajas||[]).filter(x=>x.ref!==ref);
  saveDB(); bajas();
  toast('✅ Inmueble '+ref+' reactivado en Inmuebles');
}

function eliminarBaja(ref) {
  if(!confirm('¿Eliminar definitivamente el inmueble '+ref+' de Bajas? Esta acción no se puede deshacer.')) return;
  DB.bajas = (DB.bajas||[]).filter(x=>x.ref!==ref);
  saveDB(); bajas();
  toast('Inmueble eliminado de Bajas');
}

function precios() {
  let busq='', filtroTend='todos';
  if(!DB.historial_precios) DB.historial_precios=[];

  function getRows(){
    return DB.historial_precios.map(h=>{
      const inm=DB.inmuebles.find(i=>i.ref===h.ref)||DB.cobros.find(i=>i.ref===h.ref);
      const sorted=[...h.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1);
      const actual=sorted[sorted.length-1];
      const inicial=sorted[0];
      const anterior=sorted.length>1?sorted[sorted.length-2]:null;
      const pvpActual=actual.propietario+actual.innova;
      const pvpActual2=actual.propietario+actual.innova;
      const pvpAnterior=anterior?anterior.propietario+anterior.innova:0;
      const diffUltimo=anterior?pvpActual2-pvpAnterior:0;
      const pctUltimo=anterior&&pvpAnterior?((diffUltimo/pvpAnterior)*100).toFixed(1):null;
      const diffTotal=sorted.length>1?(actual.propietario+actual.innova)-(inicial.propietario+inicial.innova):0;
      const pctTotal=(inicial.propietario+inicial.innova)?((diffTotal/(inicial.propietario+inicial.innova))*100).toFixed(1):null;
      return {id:h.id,ref:h.ref,cambios:sorted,actual,inicial,anterior,pvpActual,diffUltimo,pctUltimo,diffTotal,pctTotal,
        prop:inm?(inm.prop_nombre||inm.nombre||'')+' '+(inm.prop_apellidos||inm.apellidos||''):'-',
        loc:inm?(inm.loc_inm||inm.localidad||''):'-'};
    });
  }

  function render(){
    let rows=getRows();
    const q=busq.toLowerCase();
    if(q) rows=rows.filter(r=>(r.ref+r.prop+r.loc).toLowerCase().includes(q));
    if(filtroTend==='baja') rows=rows.filter(r=>r.diffUltimo<0);
    else if(filtroTend==='subida') rows=rows.filter(r=>r.diffUltimo>0);
    else if(filtroTend==='sin_cambio') rows=rows.filter(r=>r.diffUltimo===0);
    rows.sort((a,b)=>b.actual.fecha>a.actual.fecha?1:-1);
    document.getElementById('main').innerHTML=`
      <div class="page-header">
        <div><div class="page-title">💰 Cambios de precio</div>
        <div class="page-subtitle">${DB.historial_precios.length} inmuebles con historial de precios</div></div>
        <button class="btn btn-primary" onclick="modalPrecio()">+ Nuevo historial</button>
      </div>
      <div class="filters">
        <input class="filter-input" placeholder="🔍 Buscar referencia, propietario..." oninput="window._bp(this.value)"/>
        <select class="filter-select" onchange="window._btp(this.value)">
          <option value="todos">— Ver todos —</option>
          <option value="baja">Bajada de precio</option>
          <option value="subida">Subida de precio</option>
          <option value="sin_cambio">Sin cambio</option>
        </select>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Referencia</th><th>Propietario</th><th>Localidad</th><th>P.V.P. inicial</th><th>Precio prop.</th><th>Honorarios</th><th>P.V.P. actual</th><th>Últ. cambio</th><th>Var. último</th><th>Var. total</th><th>Historial de movimientos</th><th>Acciones</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td class="td-ref" style="font-size:14px;font-weight:700">${r.ref}</td>
          <td class="td-name">${r.prop}</td>
          <td class="td-muted">${r.loc||'-'}</td>
          <td class="td-muted num-right">${fmtP(r.inicial.propietario+r.inicial.innova)}</td>
          <td class="td-muted num-right">${fmtP(r.actual.propietario)}</td>
          <td class="td-muted num-right">${fmtP(r.actual.innova)}</td>
          <td style="font-weight:600;color:var(--accent);text-align:right">${fmtP(r.pvpActual)}</td>
          <td class="td-muted">${fmtFecha(r.actual.fecha)}</td>
          <td style="font-weight:700;text-align:right;color:${r.diffUltimo<0?'#a32d2d':r.diffUltimo>0?'#3b6d11':'var(--text3)'}">
            ${r.pctUltimo!==null?(r.diffUltimo>0?'+':'')+r.pctUltimo+'%':'-'}</td>
          <td style="font-weight:700;text-align:right;color:${r.diffTotal<0?'#a32d2d':r.diffTotal>0?'#3b6d11':'var(--text3)'}">
            ${r.pctTotal!==null?(r.diffTotal>0?'+':'')+r.pctTotal+'%':'-'}</td>
          <td style="font-size:11px;color:var(--text3);min-width:220px">${r.cambios.map((c,i)=>`<span style="white-space:nowrap">${i+1}. ${fmtFecha(c.fecha)}: prop. <strong>${fmtP(c.propietario)}</strong> · inn. ${fmtP(c.innova)} · PVP <strong>${fmtP(c.propietario+c.innova)}</strong></span>`).join('<br/>')}</td>
          <td><div class="td-actions">
            <button class="btn btn-secondary btn-sm btn-icon" onclick="modalPrecio(${r.id})">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="eliminarPrecio(${r.id})">🗑️</button>
          </div></td>
        </tr>`).join(''):`<tr><td colspan="12"><div class="empty-state"><div class="empty-icon">💰</div><div>No hay historial de precios. Pulsa "+ Nuevo historial" para añadir.</div></div></td></tr>`}
        </tbody>
      </table></div>`;
    window._bp=v=>{busq=v;render();restoreFocus('.filter-input',v)};
    window._btp=v=>{filtroTend=v;render()};
  }
  render();
}

  const cambios=h.cambios||[];
  const refsDisp=[...new Set([...DB.inmuebles.map(i=>i.ref),...DB.cobros.map(i=>i.ref),...DB.historial_precios.map(i=>i.ref)])].sort();
  openModal(`
    <div class="modal-title">${id?'Editar historial de precios':'Nuevo historial de precios'}</div>
    <div class="field">
      <label>Referencia del activo *</label>
      <input id="fp-ref" list="fp-ref-list" value="${h.ref||''}" placeholder="Ej: F 581"/>
      <datalist id="fp-ref-list">${refsDisp.map(r=>`<option value="${r}">`).join('')}</datalist>
    </div>
    <hr class="section-sep"/><div class="section-label">Movimientos de precio</div>
    <div id="cambios-container">${cambios.map((c,i)=>`
      <div class="row4" id="cam-${i}">
        <div class="field"><label>Fecha ${i+1}</label><input id="cam-fec-${i}" type="date" value="${c.fecha||''}"/></div>
        <div class="field"><label>Precio propietario (€)</label><input id="cam-pro-${i}" type="text" inputmode="decimal" value="${c.propietario?Number(c.propietario).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2})+' €':''}" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(${i})" oninput="calcPVP(${i})"/></div>
        <div class="field"><label>Honorarios Innova (€)</label><input id="cam-inn-${i}" type="text" inputmode="decimal" value="${c.innova?Number(c.innova).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2})+' €':''}" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(${i})" oninput="calcPVP(${i})"/></div>
        <div class="field"><label>P.V.P. (€)</label><input id="cam-pvp-${i}" type="text" value="${(c.propietario||0)+(c.innova||0)?Number((c.propietario||0)+(c.innova||0)).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2})+' €':''}" readonly style="background:var(--accent-light);font-weight:700"/></div>
      </div>`).join('')}
    </div>
    <button class="btn btn-secondary btn-sm" onclick="addCambio()" style="margin-top:6px">+ Añadir movimiento</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPrecio(${id||0})">💾 Guardar</button>
    </div>`);
  window._camCount=cambios.length||0;
  if(!cambios.length){ window._camCount=1; document.getElementById('cambios-container').innerHTML=`
    <div class="row4" id="cam-0">
      <div class="field"><label>Fecha 1</label><input id="cam-fec-0" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="field"><label>Precio propietario (€)</label><input id="cam-pro-0" type="text" inputmode="decimal" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(0)" oninput="calcPVP(0)"/></div>
      <div class="field"><label>Honorarios Innova (€)</label><input id="cam-inn-0" type="text" inputmode="decimal" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(0)" oninput="calcPVP(0)"/></div>
      <div class="field"><label>P.V.P. (€)</label><input id="cam-pvp-0" type="text" readonly style="background:var(--accent-light);font-weight:700"/></div>
    </div>`; }
  window.calcPVP=i=>{
    const pro=getRaw('cam-pro-'+i);
    const inn=getRaw('cam-inn-'+i);
    setFmt('cam-pvp-'+i, pro+inn||'');
  };
  window.addCambio=()=>{
    const i=window._camCount++;
    const cont=document.getElementById('cambios-container');
    const d=document.createElement('div'); d.className='row4'; d.id='cam-'+i;
    d.innerHTML=`<div class="field"><label>Fecha ${i+1}</label><input id="cam-fec-${i}" type="date" value="${new Date().toISOString().slice(0,10)}"/></div><div class="field"><label>Precio propietario (€)</label><input id="cam-pro-${i}" type="text" inputmode="decimal" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(${i})" oninput="calcPVP(${i})"/></div><div class="field"><label>Honorarios Innova (€)</label><input id="cam-inn-${i}" type="text" inputmode="decimal" onfocus="clearFmt(this)" onblur="fmtInput(this);calcPVP(${i})" oninput="calcPVP(${i})"/></div><div class="field"><label>P.V.P. (€)</label><input id="cam-pvp-${i}" type="text" readonly style="background:var(--accent-light);font-weight:700"/></div>`;

function guardarPrecio(id){
  const ref=document.getElementById('fp-ref').value.trim();
  if(!ref){toast('La referencia es obligatoria');return;}
  const cambios=[];
  for(let i=0;i<window._camCount;i++){
    const fec=document.getElementById('cam-fec-'+i);
    const pro=document.getElementById('cam-pro-'+i);
    const inn=document.getElementById('cam-inn-'+i);
    if(fec&&fec.value&&pro&&pro.value) cambios.push({fecha:fec.value,propietario:getRaw('cam-pro-'+i),innova:getRaw('cam-inn-'+i)});
  }
  if(!cambios.length){toast('Añade al menos un movimiento de precio');return;}
  if(!DB.historial_precios) DB.historial_precios=[];
  if(id){
    const h=DB.historial_precios.find(x=>x.id===id);
    h.ref=ref; h.cambios=cambios;
  } else {
    DB.historial_precios.push({id:newId('historial_precios'),ref,cambios});
  }
  saveDB();closeModal();precios();toast(id?'Historial actualizado ✓':'Historial creado ✓');
}

function eliminarPrecio(id){
  if(!confirm('¿Eliminar este historial de precios?'))return;
  DB.historial_precios=DB.historial_precios.filter(x=>x.id!==id);
  saveDB();precios();toast('Historial eliminado');
}


function eliminar(tabla, id) {
  if(!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.'))return;
  DB[tabla]=DB[tabla].filter(x=>x.id!==id);
  saveDB();goTo(currentSection);toast('Registro eliminado');
}

  let cambios = false;

  // ── Inmuebles Baja → DB.bajas ─────────────────────────────────────────────
  if(!DB.bajas) DB.bajas=[];
  const enBaja = DB.inmuebles.filter(i=>i.estado==='Baja');
  if(enBaja.length) {
    enBaja.forEach(i=>{
      const yaExiste = DB.bajas.some(b=>b.ref===i.ref);
      if(yaExiste) return;
      DB.bajas.push(Object.assign({}, i, {
        id_baja: newId('bajas'),
        id_inm: i.id,
        fecha_baja: new Date().toISOString().slice(0,10)
      }));
    });
    DB.inmuebles = DB.inmuebles.filter(i=>i.estado!=='Baja');
    enBaja.forEach(i=>{ DB.contratos=(DB.contratos||[]).filter(x=>x.ref!==i.ref); });
    cambios = true;
  }

  // ── Inmuebles Reservado → Cobros ──────────────────────────────────────────
  const reservados = DB.inmuebles.filter(i=>i.estado==='Reservado');
  if(reservados.length) {
    if(!DB.cobros) DB.cobros=[];
    reservados.forEach(i=>{
      const yaExiste = DB.cobros.some(c=>c.ref===i.ref);
      if(yaExiste) return;
      const hprecio=(DB.historial_precios||[]).find(h=>h.ref===i.ref);
      let propietario=0, innova=0;
      if(hprecio && hprecio.cambios.length){
        const ultimo=[...hprecio.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1).pop();
        propietario=ultimo.propietario||0; innova=ultimo.innova||0;
      }
      const pvp=propietario+innova, honorarios=parseFloat((innova*0.40).toFixed(2));
      const base=honorarios>0?parseFloat((honorarios/1.21).toFixed(2)):0;
      const iva=honorarios>0?parseFloat((base*0.21).toFixed(2)):0;
      const irpf=honorarios>0?parseFloat((base*0.07).toFixed(2)):0;
      const total=honorarios>0?parseFloat((base+iva-irpf).toFixed(2)):0;
      DB.cobros.push({
        id:newId('cobros'), ref:i.ref, estado:'Reservado',
        nombre:i.prop_nombre, apellidos:i.prop_apellidos,
        dir:i.dir_inm, localidad:i.loc_inm,
        fecha:new Date().toISOString().slice(0,10),
        propietario, innova, pvp, honorarios,
        base_imponible:base, iva, irpf, total, cobrado:'',
        prop_nombre:i.prop_nombre, prop_apellidos:i.prop_apellidos,
        telefono:i.telefono, email:i.email, nif:i.nif,
        dir_prop:i.dir_prop, loc_prop:i.loc_prop, prov_prop:i.prov_prop,
        tipologia:i.tipologia,
        dir_inm:i.dir_inm, loc_inm:i.loc_inm, cp_inm:i.cp_inm, prov_inm:i.prov_inm,
        m2:i.m2, dorm:i.dorm, banos:i.banos,
        ascensor:i.ascensor, calef:i.calef, terraza:i.terraza, m2t:i.m2t,
        trastero:i.trastero, garaje:i.garaje, vpo:i.vpo,
        captacion:i.captacion, ref_cat:i.ref_cat, ibi:i.ibi,
        comunidad:i.comunidad, luz:i.luz, agua:i.agua, gas:i.gas,
        obs:i.obs
      });
    });
    DB.inmuebles = DB.inmuebles.filter(i=>i.estado!=='Reservado');
    cambios = true;
  }

  if(cambios) saveDB();
  dashboard();
})();

function modalValorar(id) {
  const inm = DB.inmuebles.find(x=>x.id===id);
  if(!inm) return;
  const loc = inm.loc_inm || '';
  const tip = inm.tipologia || '';
  const isLocal = tip==='Local';
  const isTerr = tip==='Terreno';
  const isPiso = tip==='Piso' || tip==='Duplex';
  const isCasa = tip==='Casa';
  const isSolar = isLocal;

  // Determine available tipologies for this location
  const hasPiso = !!VALDATA.pisos[loc];
  const hasCasa = !!VALDATA.casas[loc];
  const hasSolar = !!VALDATA.solares[loc];
  const hasRustico = !!VALDATA.rustico[loc];

  let tipSelect = '<select id="val-tipo" onchange="valCalc()">';
  if(hasPiso) tipSelect += `<option value="piso" ${isPiso?'selected':''}>Piso / Duplex</option>`;
  if(hasCasa) tipSelect += `<option value="casa" ${isCasa?'selected':''}>Casa</option>`;
  if(hasSolar) tipSelect += `<option value="solar">Solar urbano</option>`;
  if(hasRustico) tipSelect += `<option value="rustico" ${isTerr?'selected':''}>Suelo rústico</option>`;

      +'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button></div>');
    return;
  }

  openModal(
    '<div class="modal-title">💰 Valoración — '+inm.ref+' · '+inm.loc_inm+'</div>'
    +'<div class="row3" style="margin-bottom:1rem">'
      +'<div class="field"><label>Tipología</label>'+tipSelect+'</div>'

      +'<div class="field"><label>Estado</label><select id="val-estado" onchange="valCalc()">'

        +'<option value="Nueva / Reformada">Nueva / Reformada</option>'
        +'<option value="Buen estado">Buen estado</option>'
        +'<option value="Para reformar">Para reformar</option>'
      +'</select></div>'
    +'</div>'
    +'<div id="val-extras-pisos-casas">'
      +'<div class="row4" style="margin-bottom:0.5rem">'
        +'<div class="field"><label>Garaje</label><select id="val-garaje" onchange="valCalc()"><option>NO</option><option>SI</option></select></div>'
        +'<div class="field"><label>Trastero</label><select id="val-trastero" onchange="valCalc()"><option>NO</option><option>SI</option></select></div>'
        +'<div class="field"><label>Terraza/Patio</label><select id="val-terraza" onchange="valCalc()"><option>NO</option><option>SI</option></select></div>'
        +'<div class="field"><label>Calefacción</label><select id="val-calef" onchange="valCalc()"><option>NO</option><option>SI</option></select></div>'
      +'</div>'
      +'<div class="row4" style="margin-bottom:0.5rem">'
        +'<div class="field"><label>Dormitorios</label><select id="val-dorm" onchange="valCalc()">'
          +'<option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option>'
        +'</select></div>'
        +'<div class="field"><label>Baños</label><select id="val-banos" onchange="valCalc()">'

        +'</select></div>'

function valCalc() {
  const loc = (DB.inmuebles.find(x=>x.id===window._valInmId)||{}).loc_inm || '';
  const tipo = document.getElementById('val-tipo').value;
  const m2 = parseFloat(document.getElementById('val-m2').value) || 0;
  const res = document.getElementById('val-resultado');
  const btnInf = document.getElementById('btn-informe');

  if(!m2) {
    res.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center">Introduce los m² para calcular</div>';
    if(btnInf) btnInf.style.display='none';
    return;
  }

  let precioMedio, precioMin, precioMax, labelTipo;

  if(tipo==='piso' && VALDATA.pisos[loc]) {
    precioMedio = VALDATA.pisos[loc].real;
    precioMin = VALDATA.pisos[loc].min;
    precioMax = VALDATA.pisos[loc].max;
    labelTipo = 'Piso/Duplex';
  } else if(tipo==='casa' && VALDATA.casas[loc]) {
    precioMedio = VALDATA.casas[loc].real;
    precioMin = VALDATA.casas[loc].min;
    precioMax = VALDATA.casas[loc].max;
    labelTipo = 'Casa';
  } else if(tipo==='solar' && VALDATA.solares[loc]) {
    precioMedio = VALDATA.solares[loc].medio;
    precioMin = VALDATA.solares[loc].min;
    precioMax = VALDATA.solares[loc].max;
    labelTipo = 'Solar urbano';
    // Simple calc for solar/rustico
    const vmercado = Math.round(m2 * precioMedio);
    const vmin = Math.round(m2 * precioMin);
    const vmax = Math.round(m2 * precioMax);
    res.innerHTML = valResHTML(labelTipo, loc, m2, precioMedio, vmercado, vmin, vmax, []);
    window._valResult = {tipo, loc, m2, precioMedio, vmercado, vmin, vmax, coefs:[]};
    if(btnInf) btnInf.style.display='inline-flex';
    return;
  } else if(tipo==='rustico' && VALDATA.rustico[loc]) {
    precioMedio = VALDATA.rustico[loc].medio;
    labelTipo = 'Suelo rústico';
    const vmercado = Math.round(m2 * precioMedio);
    res.innerHTML = valResHTML(labelTipo, loc, m2, precioMedio, vmercado, Math.round(vmercado*0.6), Math.round(vmercado*1.4), []);
    window._valResult = {tipo, loc, m2, precioMedio, vmercado, vmin:Math.round(vmercado*0.6), vmax:Math.round(vmercado*1.4), coefs:[]};
    if(btnInf) btnInf.style.display='inline-flex';
    return;
  } else {
    res.innerHTML = '<div style="color:var(--red);font-size:13px">No hay datos para '+loc+' - '+tipo+'</div>';
    return;
  }

  // Apply coeficients for pisos/casas
  const coefKey = tipo==='piso' ? 'pisos' : 'casas';
  const C = VALCOEFS[coefKey];
  const estado = document.getElementById('val-estado').value;
  const garaje = document.getElementById('val-garaje').value;
  const trastero = document.getElementById('val-trastero').value;
  const terraza = document.getElementById('val-terraza').value;
  const calef = document.getElementById('val-calef').value;
  const dorm = document.getElementById('val-dorm').value;
  const banos = document.getElementById('val-banos').value;
  const aire = document.getElementById('val-aire').value;
  const extras = document.getElementById('val-extras').value;

  let totalCoef = 0;
  const coefLines = [];

  function addCoef(label, val) {
    if(val!==0) { totalCoef+=val; coefLines.push({label, val}); }
  }

  addCoef('Estado: '+estado, C.estado[estado]||0);
  addCoef('Garaje: '+garaje, tipo==='piso' ? (garaje==='SI'?C.garaje['Mismo edificio']:0) : (garaje==='SI'?C.garaje['Misma Casa']:0));
  addCoef('Trastero: '+trastero, C.trastero[trastero]||0);
  addCoef('Terraza: '+terraza, C.terraza[terraza]||0);
  addCoef('Calefacción: '+calef, C.calefaccion[calef]||0);
  addCoef('Dormitorios: '+dorm, C.dormitorios[dorm]||0);
  addCoef('Baños: '+banos, C.banos[banos]||0);
  addCoef('Aire acond.: '+aire, C.aire[aire]||0);
  addCoef('Otros extras: '+extras, C.extras[extras]||0);

  const precioAjustado = precioMedio * (1 + totalCoef);
  const vmercado = Math.round(m2 * precioAjustado);
  const vmin = Math.round(m2 * precioMin);
  const vmax = Math.round(m2 * precioMax);
  const vrapido = Math.round(vmercado * 0.9);
  const vanuncio = Math.round(vmercado * 1.1);

  window._valResult = {tipo:labelTipo, loc, m2, precioMedio, precioAjustado, vmercado, vrapido, vanuncio, vmin, vmax, totalCoef, coefs:coefLines, estado, garaje, trastero, terraza, calef, dorm, banos, aire, extras};
  res.innerHTML = valResHTML(labelTipo, loc, m2, precioAjustado, vmercado, vrapido, vanuncio, vmin, vmax, coefLines, totalCoef);
  if(btnInf) btnInf.style.display='inline-flex';
}

function valResHTML(tipo, loc, m2, pm, vmercado, vrapido, vanuncio, vmin, vmax, coefs, totalCoef) {
  const fmt = n => n.toLocaleString('es-ES') + ' €';
  let coefHtml = '';
  if(coefs && coefs.length) {
    coefHtml = '<div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(24,95,165,0.15)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Ajustes aplicados</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px">';
    coefs.forEach(function(c){
      var color = c.val>0?'var(--green)':'var(--red)';
      coefHtml += '<span style="background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px 8px;font-size:11px">'
        +c.label+' <strong style="color:'+color+'">'+(c.val>0?'+':'')+(c.val*100).toFixed(1)+'%</strong></span>';
    });
    coefHtml += '</div>'
      +'<div style="font-size:12px;color:var(--text2);margin-top:6px">Precio €/m² ajustado: <strong>'+Math.round(pm)+' €/m²</strong> '
        +(totalCoef>0?'<span style="color:var(--green)">(+'+((totalCoef||0)*100).toFixed(1)+'%)</span>':'<span style="color:var(--red)">'+(((totalCoef||0)*100).toFixed(1))+'%</span>')
      +'</div></div>';
  }
  return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">'
    +'<div style="background:var(--surface);border-radius:var(--radius);padding:12px;border:2px solid var(--accent)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:4px">💰 Valor Mercado</div>'
      +'<div style="font-size:22px;font-weight:800;color:var(--text)">'+fmt(vmercado)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+Math.round(pm)+' €/m²</div>'
    +'</div>'
    +'<div style="background:var(--surface);border-radius:var(--radius);padding:12px;border:1px solid var(--border)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;margin-bottom:4px">⚡ Venta Rápida</div>'
      +'<div style="font-size:22px;font-weight:800;color:var(--text)">'+fmt(vrapido)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">-10% sobre mercado</div>'
    +'</div>'
    +'<div style="background:var(--surface);border-radius:var(--radius);padding:12px;border:1px solid var(--border)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:4px">📢 Precio Anuncio</div>'
      +'<div style="font-size:22px;font-weight:800;color:var(--text)">'+fmt(vanuncio)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">+10% sobre mercado</div>'
    +'</div>'
  +'</div>'
  +'<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text3)">Rango de mercado: <strong>'+fmt(vmin)+'</strong> — <strong>'+fmt(vmax)+'</strong> · '+m2+' m² · '+tipo+' · '+loc+'</div>'
  +coefHtml;
}

      <div class="val">${fmt(r.vanuncio||Math.round(r.vmercado*1.1))}</div>
      <div class="sub">+10% sobre mercado</div>
    </div>
  </div>

  <h2>Rango de mercado en ${inm.loc_inm}</h2>
  <p style="font-size:13px;margin-bottom:8px">Precio por m² entre <strong>${r.vmin?Math.round(r.vmin/r.m2):'-'} €/m²</strong> y <strong>${r.vmax?Math.round(r.vmax/r.m2):'-'} €/m²</strong></p>
  <div style="font-size:12px;color:#666;margin-bottom:8px">Valor mínimo: <strong>${fmt(r.vmin)}</strong> · Valor máximo: <strong>${fmt(r.vmax)}</strong></div>

  ${r.coefs && r.coefs.length ? `<h2>Ajustes aplicados</h2>
  <div class="coefs">${r.coefs.map(c=>`<span class="coef-tag">${c.label} <strong style="color:${c.val>0?'#16a34a':'#dc2626'}">${c.val>0?'+':''}${(c.val*100).toFixed(1)}%</strong></span>`).join('')}</div>` : ''}

  <div class="disclaimer">
    ⚠️ <strong>Nota:</strong> Esta valoración es orientativa y se basa en datos estadísticos de mercado para la zona de la Comunidad de Calatayud (actualización marzo 2026). No constituye una tasación oficial. El valor real del inmueble puede variar en función de factores específicos no contemplados en este análisis.
  </div>

  <div class="footer">
    <span>Innova LM Inmobiliaria · Comunidad de Calatayud</span>
    <span>Informe generado el ${hoy} · Ref. ${inm.ref}</span>
  </div>

  <div class="no-print" style="text-align:center;margin-top:30px">
    <button onclick="window.print()" style="background:linear-gradient(135deg,#185FA5,#1a7fc4);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">🖨️ Imprimir / Guardar PDF</button>
  </div>
  </body></html>`);
  w.document.close();
}

</script>
</body>
</html>
