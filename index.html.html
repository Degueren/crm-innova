<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Inmobiliario · Innova LM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8; --surface: #ffffff; --surface2: #e8eef5;
    --border: rgba(24,95,165,0.10); --border2: rgba(24,95,165,0.20);
    --text: #1a2332; --text2: #4a5568; --text3: #8a9bb0;
    --accent: #185FA5; --accent2: #1a7fc4; --accent-light: #dbeafe; --accent-text: #0c447c;
    --green: #16a34a; --green-light: #dcfce7;
    --orange: #d97706; --orange-light: #fef3c7;
    --red: #dc2626; --red-light: #fee2e2;
    --purple: #7c3aed; --purple-light: #ede9fe;
    --radius: 8px; --radius-lg: 14px; --nav-w: 225px;
    --shadow: 0 2px 8px rgba(24,95,165,0.10);
    --shadow-lg: 0 8px 32px rgba(24,95,165,0.15);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── NAV ── */
  nav { width: var(--nav-w); background: linear-gradient(180deg, #0f3d6e 0%, #185FA5 100%); border-right: none; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; box-shadow: 2px 0 12px rgba(0,0,0,0.15); }
  main { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; background: var(--bg); }
  .nav-brand { padding: 1.4rem 1.2rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.12); margin-bottom: 0.5rem; }
  .nav-brand-title { font-size: 15px; font-weight: 800; color: #ffffff; letter-spacing: -0.02em; }
  .nav-brand-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .nav-section { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; padding: 1rem 1.2rem 0.3rem; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 1.2rem; font-size: 13.5px; color: rgba(255,255,255,0.75); cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; user-select: none; margin: 1px 0; }
  .nav-item:hover { background: rgba(255,255,255,0.10); color: #fff; border-left-color: rgba(255,255,255,0.3); }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #ffffff; border-left-color: #5db8f5; font-weight: 700; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: #f87171; color: #fff; font-size: 10px; font-weight: 700; border-radius: 999px; padding: 2px 7px; }
  .nav-footer { margin-top: auto; padding: 1rem 1.1rem; border-top: 1px solid rgba(255,255,255,0.12); }
  .nav-footer-btn { width: 100%; padding: 7px; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius); background: transparent; font-size: 12px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.12s; margin-bottom: 5px; }
  .nav-footer-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── HEADER & BUTTONS ── */
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
  .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }
  .page-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, #185FA5, #1a7fc4); color: #fff; box-shadow: 0 2px 8px rgba(24,95,165,0.35); }
  .btn-primary:hover { background: linear-gradient(135deg, #134f8a, #185FA5); box-shadow: 0 4px 12px rgba(24,95,165,0.45); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #fecaca; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px 8px; }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.1rem 1.25rem; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .stat-card.stat-green::before { background: var(--green); }
  .stat-card.stat-orange::before { background: var(--orange); }
  .stat-card.stat-purple::before { background: var(--purple); }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .stat-val { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.04em; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .stat-accent .stat-val { color: var(--accent); }
  .stat-green .stat-val { color: var(--green); }
  .stat-orange .stat-val { color: var(--orange); }
  .stat-purple .stat-val { color: var(--purple); }

  /* ── FILTERS ── */
  .filters { display: flex; gap: 8px; margin-bottom: 1.1rem; flex-wrap: wrap; }
  .filter-input { flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--surface); color: var(--text); outline: none; font-family: inherit; box-shadow: var(--shadow); }
  .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .filter-select { padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; font-family: inherit; box-shadow: var(--shadow); }
  .filter-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

  /* ── TABLE ── */
  .table-wrap { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: 11px 14px; font-size: 11px; font-weight: 700; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.07em; background: linear-gradient(135deg, #dbeafe, #e8f4fd); border-bottom: 2px solid var(--accent-light); white-space: nowrap; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 13px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f0f7ff; }
  .td-ref { font-weight: 700; color: var(--accent); font-size: 13px; }
  .td-name { font-weight: 600; }
  .td-muted { color: var(--text3); font-size: 12px; }
  .td-trunc { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-actions { display: flex; gap: 5px; white-space: nowrap; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 0.75rem; }

  /* ── BADGES ── */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .b-verde { background: var(--green-light); color: #15803d; }
  .b-azul { background: var(--accent-light); color: var(--accent-text); }
  .b-naranja { background: var(--orange-light); color: #b45309; }
  .b-rojo { background: var(--red-light); color: #b91c1c; }
  .b-gris { background: #f1f5f9; color: #475569; }
  .b-morado { background: var(--purple-light); color: #6d28d9; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,45,80,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border2); padding: 1.75rem; width: 640px; max-width: 96vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--accent-light); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .field { margin-bottom: 0.9rem; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: all 0.12s; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .field textarea { resize: vertical; min-height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .section-sep { border: none; border-top: 2px solid var(--accent-light); margin: 1rem 0 0.75rem; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

  /* ── DASHBOARD CARDS ── */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  .dash-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.1rem 1.25rem; box-shadow: var(--shadow); }
  .dash-card-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.85rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent-light); }
  .dash-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .dash-item:last-child { border-bottom: none; }
  .dash-item-left { flex: 1; min-width: 0; margin-right: 8px; }
  .dash-item-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .avance-block { border-left: 3px solid var(--accent); padding: 6px 10px; margin-top: 6px; background: var(--accent-light); border-radius: 0 var(--radius) var(--radius) 0; }
  .avance-fecha { font-size: 11px; color: var(--accent-text); margin-bottom: 2px; font-weight: 600; }
  .avance-texto { font-size: 12px; color: var(--text); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: linear-gradient(135deg, #0f3d6e, #185FA5); color: #fff; padding: 11px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; box-shadow: 0 4px 16px rgba(24,95,165,0.4); transform: translateY(8px); }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .num-right { text-align: right; font-variant-numeric: tabular-nums; }
  .cobro-row-total { font-weight: 700; color: var(--accent); }
</style>
</head>

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function fmt(n) { return Number(n).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}) + ' €'; }
function fmtP(n) { return Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €'; }

// ── Formateo de inputs monetarios ─────────────────────────────────────────────
function fmtFecha(f) {
  if(!f) return '-';
  const p=f.split('-');
  if(p.length===3) return p[2]+'/'+p[1]+'/'+p[0];
  return f;
}
function restoreFocus(selector, val) {
  setTimeout(()=>{
    const el = document.querySelector(selector);
    if(el){ el.value=val; el.focus(); el.setSelectionRange(val.length,val.length); }
  }, 0);
}
function fmtInput(el) {
  const raw = parseFloat(el.value.replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,''));
  if(!isNaN(raw) && el.value.trim()!=='') el.value = raw.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2}) + ' €';
}
function clearFmt(el) {
  el.value = el.value.replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,'');
}
function getRaw(id) {
  const v = document.getElementById(id)?.value||'0';
  return parseFloat(v.replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,''))||0;
}
function setFmt(id, val) {
  const el = document.getElementById(id); if(!el) return;
  el.value = val!==''&&val!==null&&!isNaN(val) ? Number(val).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2}) + ' €' : '';
}

function estadoBadge(e) {
  const map = {
    'En Activo':'b-verde','Reservado':'b-naranja','Vendido':'b-azul','Baja':'b-rojo','Pagado':'b-verde',
    'Bueno':'b-verde','Neutral':'b-naranja','Nulo':'b-rojo','En espera':'b-morado','Cancelado':'b-rojo',
  };
  // Colores específicos para estados lead
  const leadColors = {
    'En trámite': 'background:#f59e0b;color:#fff',
    'Pendiente':  'background:#3b82f6;color:#fff',
    'Visita':     'background:#16a34a;color:#fff',
    'Cerrado':    'background:#dc2626;color:#fff',
  };
  if(leadColors[e]) return `<span class="badge" style="${leadColors[e]}">${e}</span>`;
  return `<span class="badge ${map[e]||'b-gris'}">${e}</span>`;
}

function updateBadges() {
  const ep = (DB.extras||[]).filter(e=>e.estado_lead==='Pendiente'||e.estado_lead==='En trámite').length;
  const eb = document.getElementById('badge-extras');
  if (eb) { eb.textContent=ep; eb.style.display=ep>0?'inline':'none'; }
  const vb = document.getElementById('badge-ventas');
  if(vb){ const n=(DB.ventas||[]).length; vb.textContent=n; vb.style.display=n>0?'inline':'none'; }
  const bb = document.getElementById('badge-bajas');
  if(bb){ const n=(DB.bajas||[]).length; bb.textContent=n; bb.style.display=n>0?'inline':'none'; }
  const today = new Date(); today.setHours(0,0,0,0);
  const urgContratos = (DB.contratos||[]).filter(c=>{
    const periodos = c.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
    if(!periodos.length) return false;
    const dias = Math.round((new Date(periodos[periodos.length-1].fin)-today)/(1000*60*60*24));
    return dias<=30;
  }).length;
  const cb = document.getElementById('badge-contratos');
  if(cb){ cb.textContent=urgContratos; cb.style.display=urgContratos>0?'inline':'none'; }
}

let currentSection = 'dashboard';
function goTo(s) {
  currentSection = s;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+s);
  if (navEl) navEl.classList.add('active');
  const secs = { dashboard, inmuebles, captaciones, ventas, cobros, pagado, extras, contratos, precios, bajas, valoraciones };
  if (secs[s]) secs[s]();
}

function openModal(html) {
  document.getElementById('modal-container').innerHTML =
    `<div class="modal-overlay" onclick="bgClose(event)"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
function bgClose(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }

function exportarDatos() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`crm_innova_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); toast('Datos exportados ✓');
}
function importarDatos() { document.getElementById('import-file').click(); }
function procesarImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { DB = JSON.parse(ev.target.result); saveDB(); goTo('dashboard'); toast('Datos importados ✓'); }
    catch { toast('Error al importar el archivo'); }
  };
  reader.readAsText(file); e.target.value='';
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function dashboard() {
  const activos = DB.inmuebles.filter(i=>i.estado==='En Activo').length;
  const reservados = DB.inmuebles.filter(i=>i.estado==='Reservado').length;
  const totalVentas = DB.ventas ? DB.ventas.length : 0;
  const totalCobros = DB.cobros ? DB.cobros.reduce((a,c)=>a+c.total,0) : 0;
  const leadsPend = (DB.extras||[]).filter(e=>e.estado_lead==='Pendiente'||e.estado_lead==='En trámite').length;

  const recentExtras = [...(DB.extras||[])].sort((a,b)=>b.fecha>a.fecha?1:-1).slice(0,5);
  const recentCobros = [...(DB.cobros||[])].sort((a,b)=>b.fecha>a.fecha?1:-1).slice(0,5);

  // Próximos vencimientos: calcular último periodo de cada contrato y ordenar por fecha fin
  const today = new Date(); today.setHours(0,0,0,0);
  const proximosVenc = (DB.contratos||[]).map(c=>{
    const periodos = c.periodos.filter(p=>p.fin);
    if(!periodos.length) return null;
    const ultimo = periodos.reduce((a,b)=>a.fin>b.fin?a:b);
    const dias = Math.round((new Date(ultimo.fin)-today)/(1000*60*60*24));
    // Enrich with inmueble data
    const inm = [...(DB.inmuebles||[]),...(DB.cobros||[])].find(i=>i.ref===c.ref);
    return {...c, finActual: ultimo.fin, diasRestantes: dias,
      prop: inm ? (inm.prop_nombre||inm.nombre||'')+' '+(inm.prop_apellidos||inm.apellidos||'') : '',
      loc: inm ? (inm.loc_inm||inm.localidad||'') : '',
      dir: inm ? (inm.dir_inm||inm.dir||'') : '',
      tel: inm ? (inm.telefono||'') : '',
      tip: inm ? (inm.tipologia||'') : ''
    };
  }).filter(Boolean).filter(c=>c.diasRestantes<=60).sort((a,b)=>a.diasRestantes-b.diasRestantes).slice(0,8);

  // Últimos cambios de precio
  const ultimosCambios = (DB.historial_precios||[]).flatMap(h=>{
    const sorted = [...h.cambios].sort((a,b)=>b.fecha>a.fecha?1:-1);
    if(sorted.length<2) return [];
    const ultimo = sorted[0], anterior = sorted[1];
    const pvpUltimo = ultimo.propietario + ultimo.innova;
    const pvpAnterior = anterior.propietario + anterior.innova;
    const diff = pvpUltimo - pvpAnterior;
    const pct = pvpAnterior ? ((diff/pvpAnterior)*100).toFixed(1) : 0;
    // Enrich with inmueble data
    const inm = [...(DB.inmuebles||[]),...(DB.cobros||[])].find(i=>i.ref===h.ref);
    return [{ref:h.ref, fecha:ultimo.fecha, anterior:pvpAnterior, nuevo:pvpUltimo, diff, pct,

// ── CALENDARIO ────────────────────────────────────────────────────────────────
var calYear = new Date().getFullYear();
var calMonth = new Date().getMonth();

const TIPO_EVENTO = {
  'visita':    {label:'Visita',    color:'#185FA5', bg:'#dbeafe'},
  'llamada':   {label:'Llamada',   color:'#d97706', bg:'#fef3c7'},
  'reunion':   {label:'Reunión',   color:'#7c3aed', bg:'#ede9fe'},
  'firma':     {label:'Firma',     color:'#16a34a', bg:'#dcfce7'},
  'otro':      {label:'Otro',      color:'#64748b', bg:'#f1f5f9'},
};

function renderCalendario() {
  const cont = document.getElementById('cal-widget');
  if(!cont) return;
  if(!DB.eventos) DB.eventos=[];

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const primerDia = new Date(calYear, calMonth, 1);
  const ultimoDia = new Date(calYear, calMonth+1, 0);
  const startDow = (primerDia.getDay()+6)%7; // Monday=0
  const totalDias = ultimoDia.getDate();
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Events this month
  const evMes = (DB.eventos||[]).filter(e=>{
    const d = new Date(e.fecha);
    return d.getFullYear()===calYear && d.getMonth()===calMonth;
  });

  // Upcoming events (next 7 days)
  const proximos = (DB.eventos||[]).filter(e=>{
    const d = new Date(e.fecha); d.setHours(0,0,0,0);
    const diff = Math.round((d-hoy)/(1000*60*60*24));
    return diff>=0 && diff<=7;
  }).sort((a,b)=>a.fecha>b.fecha?1:-1);

  let html = '<div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem;margin-top:0.5rem">';

  // ── CALENDAR GRID ──
  html += '<div>';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +'<button onclick="calPrev()" style="background:none;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:14px">‹</button>'
    +'<span style="font-weight:700;font-size:15px;color:var(--text)">'+meses[calMonth]+' '+calYear+'</span>'
    +'<button onclick="calNext()" style="background:none;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:14px">›</button>'
  +'</div>';

  // Day headers
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d=>{
    html += '<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px 0">'+d+'</div>';
  });
  html += '</div>';

  // Day cells
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';

  // Empty cells before month start
  for(let i=0;i<startDow;i++){
    html += '<div style="min-height:64px"></div>';
  }

  for(let dia=1;dia<=totalDias;dia++){
    const fecha = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    const esHoy = (new Date(fecha).toDateString()===hoy.toDateString());
    const esFinde = (new Date(fecha).getDay()===0||new Date(fecha).getDay()===6);
    const evDia = evMes.filter(e=>e.fecha===fecha);

    html += '<div style="min-height:64px;border-radius:6px;padding:4px;border:1px solid '+(esHoy?'var(--accent)':'var(--border)')+';background:'+(esHoy?'var(--accent-light)':esFinde?'var(--surface2)':'var(--surface)')+';cursor:pointer;transition:all 0.1s" '
      +'onclick="modalEvento(null,\''+fecha+'\')" '
      +'onmouseover="this.style.background=\'var(--accent-light)\'" '
      +'onmouseout="this.style.background=\''+(esHoy?'var(--accent-light)':esFinde?'var(--surface2)':'var(--surface)')+'\'">'
      +'<div style="font-size:12px;font-weight:'+(esHoy?'800':'500')+';color:'+(esHoy?'var(--accent)':esFinde?'var(--text3)':'var(--text)')+';margin-bottom:2px">'+dia+'</div>';

    evDia.slice(0,3).forEach(e=>{
      const t = TIPO_EVENTO[e.tipo]||TIPO_EVENTO.otro;
      html += '<div onclick="event.stopPropagation();modalVerEvento('+e.id+')" '
        +'style="font-size:9px;font-weight:600;color:'+t.color+';background:'+t.bg+';border-radius:3px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" '
        +'title="'+e.titulo+'">'
        +(e.hora?e.hora.slice(0,5)+' ':'')+e.titulo
      +'</div>';
    });
    if(evDia.length>3){
      html += '<div style="font-size:9px;color:var(--text3)">+'+(evDia.length-3)+' más</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';

  // ── SIDEBAR: upcoming + this month list ──
  html += '<div>';

  // Próximos 7 días
  html += '<div style="margin-bottom:1rem">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Próximos 7 días</div>';
  if(proximos.length){
    proximos.forEach(e=>{
      const t = TIPO_EVENTO[e.tipo]||TIPO_EVENTO.otro;
      const d = new Date(e.fecha); d.setHours(0,0,0,0);
      const diff = Math.round((d-hoy)/(1000*60*60*24));
      const cuando = diff===0?'Hoy':diff===1?'Mañana':fmtFecha(e.fecha);
      html += '<div onclick="modalVerEvento('+e.id+')" style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:flex-start">'
        +'<div style="width:32px;height:32px;border-radius:6px;background:'+t.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">'
          +(e.tipo==='visita'?'🏠':e.tipo==='llamada'?'📞':e.tipo==='reunion'?'🤝':e.tipo==='firma'?'✍️':'📌')
        +'</div>'
        +'<div style="min-width:0">'
          +'<div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e.titulo+'</div>'
          +'<div style="font-size:11px;color:var(--text3)">'+cuando+(e.hora?' · '+e.hora.slice(0,5):'')+(e.ref?' · '+e.ref:'')+'</div>'
        +'</div>'
      +'</div>';
    });
  } else {
    html += '<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin eventos esta semana</div>';
  }
  html += '</div>';

  // Este mes resumen
  html += '<div style="background:var(--surface2);border-radius:var(--radius);padding:10px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Este mes · '+evMes.length+' eventos</div>';
  Object.entries(TIPO_EVENTO).forEach(([k,v])=>{
    const n = evMes.filter(e=>e.tipo===k).length;
    if(n>0){
      html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'
        +'<span style="color:'+v.color+';font-weight:600">'+v.label+'</span>'
        +'<span style="font-weight:700">'+n+'</span>'
      +'</div>';
    }
  });
  if(!evMes.length) html += '<div style="font-size:12px;color:var(--text3)">Sin eventos este mes</div>';
  html += '</div>';

  html += '</div>';
  html += '</div>';

  cont.innerHTML = html;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendario(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendario(); }

function modalVerEvento(id){
  const e = (DB.eventos||[]).find(x=>x.id===id); if(!e) return;
  const t = TIPO_EVENTO[e.tipo]||TIPO_EVENTO.otro;
  openModal(
    '<div class="modal-title">'+e.titulo+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">'
      +'<div class="field"><label>Tipo</label><span class="badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span></div>'
      +'<div class="field"><label>Fecha y hora</label><span>'+fmtFecha(e.fecha)+(e.hora?' · '+e.hora:'')+' </span></div>'
      +(e.ref?'<div class="field"><label>Inmueble</label><span style="color:var(--accent);font-weight:600">'+e.ref+'</span></div>':'')
      +(e.cliente?'<div class="field"><label>Cliente</label><span>'+e.cliente+'</span></div>':'')
    +'</div>'
    +(e.notas?'<div class="field"><label>Notas</label><p style="font-size:13px;color:var(--text2)">'+e.notas+'</p></div>':'')
    +'<div class="modal-actions">'
      +'<button class="btn btn-danger btn-sm" onclick="eliminarEvento('+id+')">🗑️ Eliminar</button>'
      +'<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>'
      +'<button class="btn btn-primary" onclick="closeModal();modalEvento('+id+')">✏️ Editar</button>'
    +'</div>'
  );
}

function modalEvento(id, fechaDefault){
  const e = id ? (DB.eventos||[]).find(x=>x.id===id)||{} : {};
  const v = k=>e[k]||'';
  const refs = [...new Set([...(DB.inmuebles||[]),...(DB.cobros||[]),...(DB.captaciones||[])].map(i=>i.ref))].sort();
  openModal(
    '<div class="modal-title">'+(id?'Editar evento':'Nuevo evento')+'</div>'
    +'<div class="field"><label>Título *</label><input id="ev-titulo" value="'+v('titulo')+'" placeholder="Ej: Visita con cliente..."/></div>'
    +'<div class="row3">'
      +'<div class="field"><label>Tipo</label><select id="ev-tipo">'
        +Object.entries(TIPO_EVENTO).map(([k,tv])=>'<option value="'+k+'"'+(v('tipo')===k?' selected':'')+'>'+tv.label+'</option>').join('')
      +'</select></div>'
      +'<div class="field"><label>Fecha *</label><input id="ev-fecha" type="date" value="'+(v('fecha')||fechaDefault||new Date().toISOString().slice(0,10))+'"/></div>'
      +'<div class="field"><label>Hora</label><input id="ev-hora" type="time" value="'+v('hora')+'"/></div>'
    +'</div>'
    +'<div class="row2">'
      +'<div class="field"><label>Inmueble (ref.)</label>'
        +'<input id="ev-ref" list="ev-ref-list" value="'+v('ref')+'" placeholder="Opcional..."/>'
        +'<datalist id="ev-ref-list">'+refs.map(r=>'<option value="'+r+'">').join('')+'</datalist>'
      +'</div>'
      +'<div class="field"><label>Cliente</label><input id="ev-cliente" value="'+v('cliente')+'" placeholder="Nombre del cliente..."/></div>'
    +'</div>'
    +'<div class="field"><label>Notas</label><textarea id="ev-notas" style="min-height:60px">'+v('notas')+'</textarea></div>'
    +'<div class="modal-actions">'
      +'<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'
      +'<button class="btn btn-primary" onclick="guardarEvento('+(id||0)+')">💾 Guardar</button>'
    +'</div>'
  );
}

function guardarEvento(id){
  id=parseInt(id)||0;
  const titulo=document.getElementById('ev-titulo').value.trim();
  const fecha=document.getElementById('ev-fecha').value;
  if(!titulo||!fecha){toast('Título y fecha son obligatorios');return;}
  const g=i=>document.getElementById(i).value;
  const obj={titulo,fecha,hora:g('ev-hora'),tipo:g('ev-tipo'),ref:g('ev-ref'),cliente:g('ev-cliente'),notas:g('ev-notas')};
  if(!DB.eventos)DB.eventos=[];
  if(id){Object.assign(DB.eventos.find(x=>x.id===id),obj);}
  else{obj.id=newId('eventos');DB.eventos.push(obj);}
  saveDB();closeModal();
  // Re-render calendar if on dashboard
  renderCalendario();
  toast(id?'Evento actualizado ✓':'Evento creado ✓');
}

function eliminarEvento(id){
  if(!confirm('¿Eliminar este evento?'))return;
  DB.eventos=DB.eventos.filter(x=>x.id!==id);
  saveDB();closeModal();renderCalendario();toast('Evento eliminado');
}

function cargarIdealista() {
  const feed = document.getElementById('idealista-feed');
  if(!feed) return;
  feed.innerHTML = '<span style="color:var(--text3)">⏳ Buscando novedades en la Comunidad de Calatayud...</span>';

  // Comunidad de Calatayud (comarca completa)
  const rssUrl = 'https://www.idealista.com/rss/venta-viviendas/zaragoza-provincia/calatayud-zona/';
  const directUrl = 'https://www.idealista.com/venta-viviendas/zaragoza/comunidad-de-calatayud/?ordenado-por=fecha-publicacion-desc';
  const proxies = [
    'https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rssUrl)+'&count=12',
    'https://feedbridge.vercel.app/api/json?url='+encodeURIComponent(rssUrl),
  ];

  // Load previously seen IDs from localStorage
  var seenKey = 'idealista_seen_ids';
  var seenRaw = localStorage.getItem(seenKey);
  var seenIds = seenRaw ? JSON.parse(seenRaw) : [];

  function renderItems(items) {
    if(!items||!items.length){
      showFallback();
      return;
    }

    // Detect new items (not seen before)
    var currentIds = items.map(function(it){ return it.link||it.url||it.guid||it.title; });
    var newIds = currentIds.filter(function(id){ return seenIds.indexOf(id)<0; });

    // Save current IDs as seen
    localStorage.setItem(seenKey, JSON.stringify(currentIds));

    var newBadge = newIds.length > 0
      ? '<div style="background:#16a34a;color:#fff;border-radius:var(--radius);padding:6px 12px;font-size:12px;font-weight:700;margin-bottom:10px">🆕 '+newIds.length+' anuncio'+(newIds.length>1?'s nuevos':' nuevo')+' desde tu última visita</div>'
      : (seenIds.length > 0 ? '<div style="background:var(--surface2);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--text3);margin-bottom:10px">✓ Sin novedades desde tu última visita</div>' : '');

    feed.innerHTML = newBadge
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">'
      +items.slice(0,9).map(function(item){
        var titulo = item.title||item.headline||'';
        var link   = item.link||item.url||'#';
        var fecha  = (item.pubDate||item.published) ? new Date(item.pubDate||item.published).toLocaleDateString('es-ES') : '';
        var precio = titulo.match(/[\d\.]+\.?\d*\s*€/)?.[0]||'';
        var img    = (item.enclosure&&item.enclosure.link)?item.enclosure.link:(item.thumbnail||item.image||'');
        var isNew  = newIds.indexOf(link||titulo) >= 0;
        return '<a href="'+link+'" target="_blank" style="text-decoration:none;color:inherit">'
          +'<div style="border:2px solid '+(isNew?'#16a34a':'var(--border)')+';border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow 0.15s;position:relative" '
            +'onmouseover="this.style.boxShadow=\'0 4px 12px rgba(24,95,165,0.15)\'" onmouseout="this.style.boxShadow=\'\'">'
            +(isNew?'<div style="position:absolute;top:6px;left:6px;background:#16a34a;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;z-index:1">NUEVO</div>':'')
            +(img?'<img src="'+img+'" style="width:100%;height:120px;object-fit:cover" onerror="this.style.display=\'none\'"/>':'')
            +'<div style="padding:8px 10px">'
              +'<div style="font-size:11px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+titulo+'</div>'

                +(fecha?'<span style="font-size:10px;color:var(--text3)">'+fecha+'</span>':'')
              +'</div>'

          +'</div>'
        +'</a>';
      }).join('')
      +'</div>'

        +'<a href="'+directUrl+'" target="_blank" style="color:var(--accent)">Ver todos en Idealista (más recientes primero) →</a>'
      +'</div>';
  }

  function showFallback() {
    feed.innerHTML = '<div style="background:var(--surface2);border-radius:var(--radius);padding:14px">'
      +'<div style="font-weight:600;margin-bottom:6px;color:var(--text)">🏠 Comunidad de Calatayud — Idealista</div>'
      +'<div style="color:var(--text3);font-size:12px;margin-bottom:10px">Idealista bloquea el acceso automático desde aplicaciones locales. Accede directamente para ver los últimos anuncios:</div>'
      +'<a href="'+directUrl+'" target="_blank" '
        +'style="display:inline-block;background:var(--accent);color:#fff;padding:7px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;text-decoration:none">'
        +'🔍 Ver últimos anuncios en Idealista →'
      +'</a>'
    +'</div>';
  }

  function tryProxy(idx) {
    if(idx>=proxies.length){ showFallback(); return; }
    fetch(proxies[idx])
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.items&&data.items.length){ renderItems(data.items); return; }
        if(data.feed&&data.feed.entries){ renderItems(data.feed.entries); return; }
        if(data.entries&&data.entries.length){ renderItems(data.entries); return; }
        tryProxy(idx+1);
      })
      .catch(function(){ tryProxy(idx+1); });
  }

  tryProxy(0);
}

function capAddFotos(input) {
  var files = Array.from(input.files);
  var hidden = document.getElementById('fc-fotos');
  var fotos = []; try { fotos = JSON.parse(hidden.value||'[]'); } catch(e){}
  var done = 0;
  files.forEach(function(file){
    var r = new FileReader();
    r.onload = function(e){
      fotos.push(e.target.result);
      done++;
      if(done === files.length){
        hidden.value = JSON.stringify(fotos);
        var prev = document.getElementById('fc-preview');
        prev.innerHTML = '';
        fotos.forEach(function(f,i){
          prev.innerHTML += '<div style="position:relative;display:inline-block;margin:3px">'
            +'<img src="'+f+'" style="width:110px;height:80px;object-fit:cover;border-radius:6px"/>'
            +'<button onclick="capElimFoto('+i+')" style="position:absolute;top:2px;right:2px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;line-height:1">&#10005;</button>'
            +'</div>';
        });
      }
    };
    r.readAsDataURL(file);
  });
  input.value = '';
}

function capElimFoto(idx) {
  var hidden = document.getElementById('fc-fotos');
  var fotos = []; try { fotos = JSON.parse(hidden.value||'[]'); } catch(e){}
  fotos.splice(idx, 1);
  hidden.value = JSON.stringify(fotos);
  var prev = document.getElementById('fc-preview');
  prev.innerHTML = '';
  fotos.forEach(function(f,i){
    prev.innerHTML += '<div style="position:relative;display:inline-block;margin:3px">'
      +'<img src="'+f+'" style="width:110px;height:80px;object-fit:cover;border-radius:6px"/>'

function guardarCaptacion(id) {
  id = parseInt(id) || 0;
  var ref = document.getElementById('fc-ref').value.trim();
  var pnombre = document.getElementById('fc-pnombre').value.trim();
  if(!ref || !pnombre) { toast('Referencia y nombre son obligatorios'); return; }
  function g(elId){ var el=document.getElementById(elId); return el ? el.value : ''; }
  var fotos = []; try { fotos = JSON.parse(document.getElementById('fc-fotos').value||'[]'); } catch(e){}
  var obj = {
    ref: ref, estado: g('fc-estado'), prop_nombre: pnombre, prop_apellidos: g('fc-papell'),
    telefono: g('fc-tel'), email: g('fc-email'), nif: g('fc-nif'),
    dir_inm: g('fc-diri'), loc_inm: g('fc-loci'), prov_inm: g('fc-provi'),
    tipologia: g('fc-tip'), m2: g('fc-m2'), dorm: g('fc-dorm'), banos: g('fc-ban'),
    captacion: g('fc-cap'), ascensor: g('fc-asc'), calef: g('fc-calef'),
    terraza: g('fc-terraza'), m2t: g('fc-m2t'), trastero: g('fc-tras'),
    garaje: g('fc-gar'), luz: g('fc-luz'), agua: g('fc-agua'),
    gas: g('fc-gas'), ref_cat: g('fc-cat'), ibi: g('fc-ibi'),
    vpo: g('fc-vpo'), comunidad: g('fc-com'), obs: g('fc-obs'), fotos: fotos
  };
  if(!DB.captaciones) DB.captaciones = [];
  if(id) {
    var ex = DB.captaciones.find(function(x){ return x.id === id; });
    if(ex) { Object.assign(ex, obj); }
    else { obj.id = id; DB.captaciones.push(obj); }
  } else {
    obj.id = newId('captaciones');
    DB.captaciones.push(obj);
  }
  saveDB(); closeModal(); captaciones(); toast(id ? 'Captación actualizada ✓' : 'Captación creada ✓');
}

function eliminarCaptacion(id) {
  if(!confirm('¿Eliminar esta captación?')) return;
  DB.captaciones = DB.captaciones.filter(function(x){ return x.id !== id; });
  saveDB(); captaciones(); toast('Captación eliminada');
}


function inmuebles() {
  let busq='', filtroE='', filtroT='', filtroVenc='';
  function render() {
    let data = DB.inmuebles.filter(i=>{
      const q=busq.toLowerCase();
      const match = !q||(i.ref+i.prop_nombre+i.prop_apellidos+i.loc_inm+i.dir_inm).toLowerCase().includes(q);
      return match&&(!filtroE||i.estado===filtroE)&&(!filtroT||i.tipologia===filtroT);
    });

    // Enriquecer con datos de vencimiento para filtrar y ordenar
    const today = new Date(); today.setHours(0,0,0,0);
    data = data.map(i=>{
      const contrato=(DB.contratos||[]).find(c=>c.ref===i.ref);
      let finActual=null, dias=null;
      if(contrato&&contrato.periodos.length){
        const ps=contrato.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
        const ult=ps[ps.length-1];
        if(ult){ finActual=ult.fin; dias=Math.round((new Date(ult.fin)-today)/(1000*60*60*24)); }
      }
      return {...i, _finActual:finActual, _dias:dias};
    });

    // Filtro vencimiento
    if(filtroVenc==='vencido') data=data.filter(i=>i._dias!==null&&i._dias<0);
    else if(filtroVenc==='urgente') data=data.filter(i=>i._dias!==null&&i._dias>=0&&i._dias<=30);
    else if(filtroVenc==='proximo') data=data.filter(i=>i._dias!==null&&i._dias>30&&i._dias<=60);
    else if(filtroVenc==='vigente') data=data.filter(i=>i._dias!==null&&i._dias>60);
    else if(filtroVenc==='sin') data=data.filter(i=>i._dias===null);

    // Orden por vencimiento
    if(filtroVenc==='asc') data.sort((a,b)=>(a._finActual||'9999')>(b._finActual||'9999')?1:-1);
    else if(filtroVenc==='desc') data.sort((a,b)=>(a._finActual||'0000')<(b._finActual||'0000')?1:-1);

    const tipologias = [...new Set(DB.inmuebles.map(i=>i.tipologia).filter(Boolean))];
    document.getElementById('main').innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Inmuebles</div><div class="page-subtitle">${DB.inmuebles.length} registrados · ${DB.inmuebles.filter(i=>i.estado==='En Activo').length} activos</div></div>
        <button class="btn btn-primary" onclick="modalInmueble()">+ Nuevo inmueble</button>
      </div>
      <div class="filters">
        <input class="filter-input" placeholder="🔍 Buscar ref, propietario, localidad..." oninput="window._bi(this.value)"/>
        <select class="filter-select" onchange="window._bei(this.value)">
          <option value="">Todos los estados</option>
          ${['En Activo','Reservado','Vendido','Baja','Pagado'].map(e=>`<option ${filtroE===e?'selected':''}>${e}</option>`).join('')}
        </select>
        <select class="filter-select" onchange="window._bti(this.value)">
          <option value="">Todos los tipos</option>
          ${tipologias.map(t=>`<option ${filtroT===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <select class="filter-select" onchange="window._bvi(this.value)">
          <option value="">Vencimiento: todos</option>
          <option value="asc">📅 Ordenar: más próximo primero</option>
          <option value="desc">📅 Ordenar: más lejano primero</option>
          <option value="vencido">🔴 Vencidos</option>
          <option value="urgente">🔴 Urgentes (≤30d)</option>
          <option value="proximo">🟠 Próximos (≤60d)</option>

      </div>
      <div class="table-wrap"><table>

        <tbody>${data.length ? data.map(i=>{
          const dias=i._dias;
          let vencHtml='-';
          if(i._finActual){
            const cls=dias<0?'b-rojo':dias<=30?'b-rojo':dias<=60?'b-naranja':'b-verde';
            vencHtml=`<span style="font-size:11px;font-weight:600">${fmtFecha(i._finActual)}</span><br/><span class="badge ${cls}" style="margin-top:2px">${dias<0?'Vencido':dias+'d'}</span>`;
          }
          const hp=(DB.historial_precios||[]).find(h=>h.ref===i.ref);
          let precioHtml='-';
          if(hp&&hp.cambios.length){
            const sorted=[...hp.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1);
            const ult=sorted[sorted.length-1];
            precioHtml=`<span style="font-size:11px;font-weight:600">${fmtP(ult.propietario+ult.innova)}</span><br/><span style="font-size:10px;color:var(--text3)">${fmtFecha(ult.fecha)}</span>`;
          }
          return `<tr>
          <td class="td-ref">${i.ref}</td>
          <td>${estadoBadge(i.estado)}</td>
          <td class="td-name">${i.prop_nombre} ${i.prop_apellidos}</td>
          <td class="td-muted">${i.telefono||'-'}</td>
          <td><span class="badge b-gris">${i.tipologia||'-'}</span></td>
          <td class="td-trunc">${i.dir_inm||'-'}</td>
          <td class="td-muted">${i.loc_inm||'-'}</td>
          <td class="td-muted">${i.m2?i.m2+' m²':'-'}</td>
          <td class="td-muted">${i.dorm||'-'}</td>
          <td style="font-size:11px">${vencHtml}</td>
          <td style="font-size:11px">${precioHtml}</td>
          <td><div class="td-actions">
            <button class="btn btn-secondary btn-sm" onclick="verInmueble(${i.id})">👁️</button>
            <button class="btn btn-secondary btn-sm btn-icon" onclick="modalInmueble(${i.id})">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="eliminar('inmuebles',${i.id})">🗑️</button>
          </div></td>
        </tr>`;}).join('') : `<tr><td colspan="12"><div class="empty-state"><div class="empty-icon">🏘️</div><div class="empty-msg">No hay inmuebles.</div></div></td></tr>`}
        </tbody>
      </table></div>`;
    window._bi=v=>{busq=v;render();restoreFocus('.filter-input',v)};
    window._bei=v=>{filtroE=v;render()};
    window._bti=v=>{filtroT=v;render()};
    window._bvi=v=>{filtroVenc=v;render()};
  }
  render();
}

function verFichaInmueble(ref) {
  if(!ref||ref==='undefined') return;
  ref = ref.trim();

  // If in inmuebles, use full verInmueble
  const inm = (DB.inmuebles||[]).find(x=>x.ref===ref);
  if(inm){ verInmueble(inm.id); return; }

  // Find in cobros/ventas/pagado/captaciones
  const trans = [...(DB.cobros||[]),...(DB.ventas||[]),...(DB.pagado||[]),...(DB.bajas||[])].find(x=>x.ref===ref);
  const cap   = (DB.captaciones||[]).find(x=>x.ref===ref);
  const i     = trans || cap;

  if(!i){
    openModal('<div class="modal-title">Ficha del inmueble</div>'
      +'<p style="color:var(--text3);padding:1rem 0">No se encontró la ficha del inmueble <strong>'+ref+'</strong>.</p>'
      +'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button></div>');
    return;
  }

  // Normalize fields (cobros/ventas/pagado use nombre/dir/localidad; captaciones use prop_nombre/dir_inm/loc_inm)
  // Also cross-reference original inmueble record for complete data
  const inmBase = [...(DB.inmuebles||[]),...(DB.captaciones||[])].find(x=>x.ref===ref);
  const nombre    = i.prop_nombre||i.nombre||inmBase?.prop_nombre||'';
  const apellidos = i.prop_apellidos||i.apellidos||inmBase?.prop_apellidos||'';
  const tel       = i.telefono||inmBase?.telefono||'';
  const email     = i.email||inmBase?.email||'';
  const nif       = i.nif||inmBase?.nif||'';
  const dir       = i.dir_inm||i.dir||inmBase?.dir_inm||'';
  const loc       = i.loc_inm||i.localidad||inmBase?.loc_inm||'';
  const prov      = i.prov_inm||inmBase?.prov_inm||'';
  const tipologia = i.tipologia||inmBase?.tipologia||'';
  const m2        = i.m2||inmBase?.m2||'';
  const dorm      = i.dorm||inmBase?.dorm||'';
  const banos     = i.banos||inmBase?.banos||'';
  const ascensor  = i.ascensor||inmBase?.ascensor||'';
  const calef     = i.calef||inmBase?.calef||'';
  const terraza   = i.terraza||inmBase?.terraza||'';
  const trastero  = i.trastero||inmBase?.trastero||'';
  const garaje    = i.garaje||inmBase?.garaje||'';
  const vpo       = i.vpo||inmBase?.vpo||'';
  const luz       = i.luz||inmBase?.luz||'';
  const agua      = i.agua||inmBase?.agua||'';
  const gas       = i.gas||inmBase?.gas||'';
  const ref_cat   = i.ref_cat||inmBase?.ref_cat||'';
  const ibi       = i.ibi||inmBase?.ibi||'';
  const comunidad = i.comunidad||inmBase?.comunidad||'';
  const obs       = i.obs||inmBase?.obs||'';


  // Get historial precio
  const hp = (DB.historial_precios||[]).find(h=>h.ref===ref);
  let precioStr = '-';
  if(hp&&hp.cambios.length){
    const ult=[...hp.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1).pop();
    precioStr=fmtP((ult.propietario||0)+(ult.innova||0))+' ('+fmtFecha(ult.fecha)+')';
  } else if(i.propietario||i.innova) {
    precioStr=fmtP((i.propietario||0)+(i.innova||0));
  }

  // Get contrato vencimiento
  const contrato=(DB.contratos||[]).find(c=>c.ref===ref);
  let vencStr='-';
  if(contrato&&contrato.periodos.length){
    const ps=contrato.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
    if(ps.length){
      const ult=ps[ps.length-1];
      const dias=Math.round((new Date(ult.fin)-new Date())/(1000*60*60*24));
      vencStr=fmtFecha(ult.fin)+' · '+(dias<0?'Vencido hace '+Math.abs(dias)+'d':dias+'d restantes');
    }
  }

  const catUrl = ref_cat&&ref_cat.length>=5 ? "https://www1.sedecatastro.gob.es/CYCBienInmueble/OVCBusqueda.aspx?pest=rc&RCCompleta="+encodeURIComponent(ref_cat) : "";
  const catLink = ref_cat
    ?'<a href="'+catUrl+'" target="_blank" style="color:var(--accent);font-weight:600;text-decoration:none">'+ref_cat+' 🏛️</a>':'-';

  openModal(
    '<div class="modal-title">📄 '+ref+(tipologia?' — '+tipologia:'')+(loc?' · '+loc:'')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">'
      +'<div>'
        +'<div class="section-label">Propietario</div>'
        +'<p style="font-size:14px"><strong>'+nombre+' '+apellidos+'</strong></p>'
        +(tel?'<p class="td-muted">📞 '+tel+'</p>':'')
        +(email?'<p class="td-muted">✉️ '+email+'</p>':'')
        +(nif?'<p class="td-muted">NIF: '+nif+'</p>':'')
        +'<hr class="section-sep"/>'
        +'<div class="section-label">Inmueble</div>'
        +(dir?'<p class="td-muted">📍 '+dir+(loc?', '+loc:'')+(prov?' ('+prov+')':'')+'</p>':'<p class="td-muted">'+loc+(prov?' ('+prov+')':'')+'</p>')
        +'<p class="td-muted">Ref. Cat.: '+catLink+'</p>'
        +(ibi?'<p class="td-muted">IBI: '+ibi+' €</p>':'')
        +(comunidad?'<p class="td-muted">Comunidad: '+comunidad+' €</p>':'')
      +'</div>'
      +'<div>'
        +'<div class="section-label">Características</div>'
        +'<p class="td-muted">📐 '+(m2?m2+' m²':'-')+(dorm?' · '+dorm+' dorm.':'')+(banos?' · '+banos+' baños':'')+'</p>'
        +(ascensor?'<p class="td-muted">Ascensor: '+ascensor+(calef?' · Calef.: '+calef:'')+'</p>':'')
        +(terraza?'<p class="td-muted">Terraza: '+terraza+(trastero?' · Trastero: '+trastero:'')+'</p>':'')
        +(garaje?'<p class="td-muted">Garaje: '+garaje+(vpo?' · VPO: '+vpo:'')+'</p>':'')
        +'<hr class="section-sep"/>'
        +'<div class="section-label">Suministros</div>'
        +'<p class="td-muted">Luz: '+(luz||'-')+' · Agua: '+(agua||'-')+' · Gas: '+(gas||'-')+'</p>'
        +'<hr class="section-sep"/>'
        +'<div class="section-label">Último P.V.P.</div>'
        +'<p class="td-muted" style="font-weight:600;color:var(--accent)">'+precioStr+'</p>'
        +'<div class="section-label" style="margin-top:8px">Vencimiento contrato</div>'
        +'<p class="td-muted">'+vencStr+'</p>'
        +(obs?'<hr class="section-sep"/><div class="section-label">Observaciones</div><p class="td-muted">'+obs+'</p>':'')
      +'</div>'
    +'</div>'
    +'<div class="modal-actions">'
      +(catUrl?'<a href="'+catUrl+'" target="_blank" class="btn btn-secondary">🏛️ Ver en Catastro</a>':'')
      +'<button class="btn btn-primary" onclick="closeModal()">Cerrar</button>'
    +'</div>'
  );
}


function verInmueble(id) {
  const i = DB.inmuebles.find(x=>x.id===id); if(!i) return;
  const contrato=(DB.contratos||[]).find(c=>c.ref===i.ref);
  let vencInfo='Sin contrato registrado';
  if(contrato&&contrato.periodos.length){
    const ps=contrato.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
    const ult=ps[ps.length-1];
    if(ult){
      const dias=Math.round((new Date(ult.fin)-new Date())/(1000*60*60*24));
      const estado=dias<0?'Vencido':dias<=30?'Urgente ('+dias+'d)':dias<=60?'Próximo ('+dias+'d)':'Vigente ('+dias+'d)';
      vencInfo=`Fin: <strong>${ult.fin}</strong> · ${estado}`;
      if(ps.length>1) vencInfo+=`<br/><span style="color:var(--text3);font-size:11px">${ps.length} periodos registrados</span>`;
    }
  }
  const hp=(DB.historial_precios||[]).find(h=>h.ref===i.ref);
  let precioInfo='Sin historial de precios';
  if(hp&&hp.cambios.length){
    const sorted=[...hp.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1);
    const ult=sorted[sorted.length-1];
    const ini=sorted[0];
    precioInfo=`P.V.P. actual: <strong>${fmtP(ult.propietario+ult.innova)}</strong> · Fecha: ${fmtFecha(ult.fecha)}`;
    if(sorted.length>1){
      const diff=ult.propietario-ini.propietario;
      const pct=ini.propietario?((diff/ini.propietario)*100).toFixed(1):0;
      precioInfo+=`<br/><span style="color:var(--text3);font-size:11px">PVP inicial: ${fmtP(ini.propietario+ini.innova)} · Variación: <span style="color:${diff<0?'#a32d2d':diff>0?'#3b6d11':'var(--text3)'};font-weight:600">${diff>0?'+':''}${pct}%</span></span>`;
    }
  }
  openModal(`
    <div class="modal-title">📄 ${i.ref} — ${i.tipologia} · ${i.loc_inm}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
      <div>
        <div class="section-label">Propietario</div>
        <p><strong>${i.prop_nombre} ${i.prop_apellidos}</strong></p>
        <p class="td-muted">📞 ${i.telefono||'--'}</p>
        <p class="td-muted">✉️ ${i.email||'--'}</p>
        <p class="td-muted">NIF: ${i.nif||'--'}</p>
        <p class="td-muted">${i.dir_prop} · ${i.loc_prop} ${i.cp_prop} (${i.prov_prop})</p>
        <hr class="section-sep"/>
        <div class="section-label">Inmueble</div>
        <p class="td-muted">${i.dir_inm} · ${i.loc_inm} ${i.cp_inm} (${i.prov_inm})</p>
        <p class="td-muted">Ref. Cat.: ${(function(r){if(!r||r.length<5)return r||"-";var url="https://www1.sedecatastro.gob.es/CYCBienInmueble/OVCBusqueda.aspx?pest=rc&RCCompleta="+encodeURIComponent(r);return "<a href='"+url+"' target='_blank' onclick='navigator.clipboard&&navigator.clipboard.writeText(&quot;"+r+"&quot;)' style='color:var(--accent);font-weight:600;text-decoration:none' title='Clic: copia al portapapeles y abre Catastro'>"+r+"</a>";})(i.ref_cat)}</p>
        <p class="td-muted">IBI: ${i.ibi||'--'} · Comunidad: ${i.comunidad||'--'}</p>
      </div>
      <div>
        <div class="section-label">Características</div>
        <p class="td-muted">${i.m2?i.m2+' m²':'--'} · ${i.dorm?i.dorm+' dorm.':'--'} · ${i.banos?i.banos+' baños':'--'}</p>
        <p class="td-muted">Terraza/Patio: ${i.terraza||'No'} ${i.m2t?'('+i.m2t+' m²)':''}</p>
        <p class="td-muted">Ascensor: ${i.ascensor||'--'} · Calef.: ${i.calef||'No'}</p>
        <p class="td-muted">Trastero: ${i.trastero||'--'} · Garaje: ${i.garaje||'--'}</p>
        <p class="td-muted">VPO: ${i.vpo||'--'} · Captación: ${i.captacion||'--'}</p>
        <hr class="section-sep"/>
        <div class="section-label">Suministros</div>
        <p class="td-muted">Luz: ${i.luz||'--'} · Agua: ${i.agua||'--'} · Gas: ${i.gas||'--'}</p>
        <hr class="section-sep"/>
        <div class="section-label">Observaciones</div>
        <p class="td-muted">${i.obs||'--'}</p>
      </div>
    </div>
    <hr class="section-sep"/>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:0.5rem">
      <div>
        <div class="section-label">📅 Vencimiento de contrato</div>
        <p class="td-muted">${vencInfo}</p>
      </div>
      <div>
        <div class="section-label">💰 Último cambio de precio</div>
        <p class="td-muted">${precioInfo}</p>
      </div>
    </div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button><button class="btn btn-primary" onclick="closeModal();modalInmueble(${id})">✏️ Editar</button></div>`);
}

function guardarInmueble(id) {
  const ref=document.getElementById('f-ref').value.trim();
  const pnombre=document.getElementById('f-pnombre').value.trim();
  if(!ref||!pnombre){toast('Referencia y nombre son obligatorios');return;}
  const g=i=>document.getElementById(i).value;
  const nuevoEstado=g('f-estado');
  const anterior=id?DB.inmuebles.find(x=>x.id===id):null;
  const estadoAnterior=anterior?anterior.estado:'';
  const obj={ref,estado:nuevoEstado,prop_nombre:pnombre,prop_apellidos:g('f-papell'),
    telefono:g('f-tel'),email:g('f-email'),nif:g('f-nif'),dir_prop:g('f-dirp'),
    loc_prop:g('f-locp'),prov_prop:g('f-provp'),tipologia:g('f-tip'),
    dir_inm:g('f-diri'),loc_inm:g('f-loci'),prov_inm:g('f-provi'),
    m2:g('f-m2'),dorm:g('f-dorm'),banos:g('f-ban'),captacion:g('f-cap'),
    ascensor:g('f-asc'),calef:g('f-calef'),terraza:g('f-terraza'),m2t:g('f-m2t'),
    trastero:g('f-tras'),garaje:g('f-gar'),luz:g('f-luz'),agua:g('f-agua'),
    ref_cat:g('f-cat'),ibi:g('f-ibi'),comunidad:g('f-com'),
    fecha_alta_contrato:g('f-fecha-alta'),fecha_baja_contrato:g('f-fecha-baja'),
    precio_propietario:g('f-precio-prop'),precio_innova:g('f-precio-innova'),
    precio_pvp:g('f-precio-pvp'),
    obs:g('f-obs')};
  if(id){Object.assign(DB.inmuebles.find(x=>x.id===id),obj);}
  else{obj.id=newId('inmuebles');DB.inmuebles.push(obj);}

  // ── Crear/actualizar contrato en Vencimientos si hay fechas ──────────────
  const fechaAlta = g('f-fecha-alta');
  const fechaBaja = g('f-fecha-baja');
  if(fechaBaja) {
    if(!DB.contratos) DB.contratos=[];
    if(!DB.nextId.contratos) DB.nextId.contratos = (DB.contratos.length ? Math.max(...DB.contratos.map(c=>c.id))+1 : 1);
    const contratoExistente = DB.contratos.find(c=>c.ref===ref);
    const periodo = {inicio: fechaAlta||'', fin: fechaBaja, meses: ''};
    if(contratoExistente) {
      contratoExistente.periodos = [periodo];
    } else {
      DB.contratos.push({id:newId('contratos'), ref, periodos:[periodo]});
    }
  }

  // ── Crear entrada en Cambios de precio si hay precios ────────────────────
  const pProp = parseFloat(g('f-precio-prop'))||0;
  const pInn  = parseFloat(g('f-precio-innova'))||0;
  if(pProp || pInn) {
    if(!DB.historial_precios) DB.historial_precios=[];
    if(!DB.nextId.historial_precios) DB.nextId.historial_precios = (DB.historial_precios.length ? Math.max(...DB.historial_precios.map(h=>h.id))+1 : 1);
    const hExistente = DB.historial_precios.find(h=>h.ref===ref);
    const cambio = {fecha: fechaAlta||new Date().toISOString().slice(0,10), propietario:pProp, innova:pInn};
    if(hExistente) {
      // Only add if no entry for this date yet
      if(!hExistente.cambios.find(c=>c.fecha===cambio.fecha)) {
        hExistente.cambios.push(cambio);
      }
    } else {
      DB.historial_precios.push({id:newId('historial_precios'), ref, cambios:[cambio]});
    }
  }

  // ── Mover a Pagado desde Inmuebles ───────────────────────────────────────
  if(nuevoEstado==='Pagado' && estadoAnterior!=='Pagado') {
    if(!DB.pagado) DB.pagado=[];
    const hprecio=(DB.historial_precios||[]).find(h=>h.ref===ref);
    let propietario=0, innova=0;
    if(hprecio && hprecio.cambios.length){
      const ultimo=[...hprecio.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1).pop();
      propietario=ultimo.propietario||0; innova=ultimo.innova||0;
    }
    const pvp=propietario+innova;
    const honorarios=parseFloat((innova*0.40).toFixed(2));
    const base=honorarios>0?parseFloat((honorarios/1.21).toFixed(2)):0;
    const iva=honorarios>0?parseFloat((base*0.21).toFixed(2)):0;
    const irpf=honorarios>0?parseFloat((base*0.07).toFixed(2)):0;
    const total=honorarios>0?parseFloat((base+iva-irpf).toFixed(2)):0;
    DB.pagado.push({
      id:newId('pagado'), ref, estado:'Pagado',
      nombre:pnombre, apellidos:g('f-papell'),
      dir:g('f-diri'), localidad:g('f-loci'),
      fecha:new Date().toISOString().slice(0,10),
      fecha_pago:new Date().toISOString().slice(0,10),
      propietario, innova, pvp, honorarios,
      base_imponible:base, iva, irpf, total, cobrado:'SI'
    });
    DB.inmuebles=DB.inmuebles.filter(x=>x.id!==id);
    saveDB();closeModal();inmuebles();
    toast('✅ Movido a Pagado y eliminado de Inmuebles');
    return;
  }

  // ── Auto-cobro al pasar a Reservado ──────────────────────────────────────
  if(nuevoEstado==='Reservado' && estadoAnterior!=='Reservado') {
    const yaExiste=(DB.cobros||[]).some(c=>c.ref===ref);
    if(!yaExiste) {
      // Buscar precio actual del historial de precios
      const hprecio=(DB.historial_precios||[]).find(h=>h.ref===ref);
      let propietario=0, innova=0;
      if(hprecio && hprecio.cambios.length) {
        const ultimo=[...hprecio.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1).pop();
        propietario=ultimo.propietario||0;
        innova=ultimo.innova||0;
      }
      const pvp=propietario+innova;
      const honorarios=parseFloat((innova*0.40).toFixed(2));
      const base=honorarios>0?parseFloat((honorarios/1.21).toFixed(2)):0;
      const iva=honorarios>0?parseFloat((base*0.21).toFixed(2)):0;
      const irpf=honorarios>0?parseFloat((base*0.07).toFixed(2)):0;
      const total=honorarios>0?parseFloat((base+iva-irpf).toFixed(2)):0;
      if(!DB.cobros)DB.cobros=[];
      DB.cobros.push({
        id:newId('cobros'), ref, estado:'Reservado',
        nombre:pnombre, apellidos:g('f-papell'),
        dir:g('f-diri'), localidad:g('f-loci'),
        fecha:new Date().toISOString().slice(0,10),
        propietario, innova, pvp, honorarios,
        base_imponible:base, iva, irpf, total, cobrado:'',
        prop_nombre:pnombre, prop_apellidos:g('f-papell'),
        telefono:g('f-tel'), email:g('f-email'), nif:g('f-nif'),
        dir_prop:g('f-dirp'), loc_prop:g('f-locp'), prov_prop:g('f-provp'),
        tipologia:g('f-tipo'),
        dir_inm:g('f-diri'), loc_inm:g('f-loci'), cp_inm:g('f-cpi'), prov_inm:g('f-provi'),
        m2:g('f-m2'), dorm:g('f-dorm'), banos:g('f-ban'),
        ascensor:g('f-asc'), calef:g('f-cal'), terraza:g('f-ter'), m2t:g('f-m2t'),
        trastero:g('f-tras'), garaje:g('f-gar'), vpo:g('f-vpo'),
        captacion:g('f-cap'), ref_cat:g('f-cat'), ibi:g('f-ibi'),
        comunidad:g('f-com'), luz:g('f-luz'), agua:g('f-agua'), gas:g('f-gas'),
        obs:g('f-obs')
      });
      // Eliminar de inmuebles
      DB.inmuebles=DB.inmuebles.filter(x=>x.id!==id);
      saveDB();closeModal();inmuebles();
      toast('✅ Movido a Cobros y eliminado de Inmuebles');
      return;
    }
  }
  // ── Mover a Bajas ────────────────────────────────────────────────────────
  if(nuevoEstado==='Baja' && estadoAnterior!=='Baja') {
    if(!DB.bajas) DB.bajas=[];
    // Copy full inmueble data to bajas
    const inmObj = DB.inmuebles.find(x=>x.id===id)||obj;
    DB.bajas.push(Object.assign({}, inmObj, {
      id_baja: newId('bajas'),
      id_inm: id,
      fecha_baja: new Date().toISOString().slice(0,10),
      estado: 'Baja'
    }));
    DB.inmuebles = DB.inmuebles.filter(x=>x.id!==id);
    // Eliminar contrato de vencimientos
    DB.contratos = (DB.contratos||[]).filter(x=>x.ref!==ref);
    saveDB();closeModal();inmuebles();
    toast('🔻 Inmueble dado de baja');
    return;
  }

  // ── Volver a En Activo desde Bajas ───────────────────────────────────────
  if(nuevoEstado==='En Activo' && estadoAnterior==='Baja') {
    // Remove from bajas if present
    DB.bajas = (DB.bajas||[]).filter(x=>x.ref!==ref);
    saveDB();closeModal();inmuebles();
    toast('✅ Inmueble reactivado');
    return;
  }

  // ── Mover a Bajas ────────────────────────────────────────────────────────
  if(nuevoEstado==='Baja' && estadoAnterior!=='Baja') {
    if(!DB.bajas) DB.bajas=[];
    const inmObj = DB.inmuebles.find(x=>x.id===id);
    if(inmObj) {
      DB.bajas.push(Object.assign({}, inmObj, {estado:'Baja', fecha_baja:new Date().toISOString().slice(0,10)}));
      DB.inmuebles = DB.inmuebles.filter(x=>x.id!==id);
      // Eliminar contrato de vencimientos
      DB.contratos = (DB.contratos||[]).filter(x=>x.ref!==inmObj.ref);
      saveDB();closeModal();inmuebles();
      toast('📁 Inmueble dado de baja');
      return;
    }
  }

  saveDB();closeModal();inmuebles();updateBadges();toast(id?'Inmueble actualizado ✓':'Inmueble creado ✓');
}

function guardarVenta(id) {
  if(!id){toast('Error: id no válido');return;}
  const gs=i=>document.getElementById(i).value;
  const nuevoEstado=gs('fv-estado');
  const anterior=(DB.ventas||[]).find(x=>x.id===id);
  const obj={...anterior,
    estado:nuevoEstado, fecha:gs('fv-fecha'),
    nombre:gs('fv-nombre'), apellidos:gs('fv-apell'),
    dir:gs('fv-dir'), localidad:gs('fv-loc'),
    propietario:getRaw('fv-prop'), innova:getRaw('fv-innova'), pvp:getRaw('fv-pvp'),
    honorarios:getRaw('fv-hon'), base_imponible:getRaw('fv-bi'),
    iva:getRaw('fv-iva'), irpf:getRaw('fv-irpf'), total:getRaw('fv-tot')};
  Object.assign(DB.ventas.find(x=>x.id===id), obj);

  // Si cambia a Pagado → mover a Pagado
  if(nuevoEstado==='Pagado') {
    if(!DB.pagado) DB.pagado=[];
    DB.pagado.push({...obj, id:newId('pagado'), estado:'Pagado', fecha_pago:new Date().toISOString().slice(0,10)});
    DB.ventas=DB.ventas.filter(x=>x.id!==id);
    saveDB();closeModal();pagado();
    toast('✅ Movido a Pagado');
    return;
  }
  saveDB();closeModal();ventas();toast('Venta actualizada ✓');
}

function eliminarVenta(id) {
  if(!confirm('¿Eliminar esta venta?'))return;
  DB.ventas=DB.ventas.filter(x=>x.id!==id);
  saveDB();ventas();toast('Venta eliminada');
}

    const tot=round(bi+iva-irpf,2);

    setFmt('f-hon', h.toFixed(2));
    setFmt('f-bi', bi.toFixed(2));
    setFmt('f-iva', iva.toFixed(2));
    setFmt('f-irpf', irpf.toFixed(2));

function guardarCobro(id) {
  const ref=document.getElementById('f-ref').value.trim();
  if(!ref){toast('La referencia es obligatoria');return;}
  const g=i=>getRaw(i);
  const gs=i=>document.getElementById(i).value;
  const nuevoEstado=gs('f-estado');
  const anterior=id?(DB.cobros||[]).find(x=>x.id===id):null;
  const estadoAnterior=anterior?anterior.estado:'';
  const obj={ref,estado:nuevoEstado,fecha:gs('f-fecha'),
    nombre:gs('f-nombre'),apellidos:gs('f-apell'),dir:gs('f-dir'),localidad:gs('f-loc'),
    propietario:g('f-prop'),innova:g('f-innova'),pvp:g('f-pvp'),
    honorarios:g('f-hon'),base_imponible:g('f-bi'),iva:g('f-iva'),irpf:g('f-irpf'),total:g('f-tot'),
    cobrado:gs('f-cobrado')};
  if(!DB.cobros)DB.cobros=[];
  if(id){Object.assign(DB.cobros.find(x=>x.id===id),obj);}
  else{obj.id=newId('cobros');DB.cobros.push(obj);}

  // ── Mover a Ventas si Vendido ─────────────────────────────────────────────
  if(nuevoEstado==='Vendido') {
    if(!DB.ventas) DB.ventas=[];
    const c=DB.cobros.find(x=>x.id===id);
    DB.ventas.push({...c, id:newId('ventas'), estado:'Vendido'});
    DB.cobros=DB.cobros.filter(x=>x.id!==id);
    DB.contratos=(DB.contratos||[]).filter(x=>x.ref!==c.ref);
    saveDB();closeModal();ventas();
    toast('🏷️ Movido a Ventas');
    return;
  }

  // ── Mover a Pagado ────────────────────────────────────────────────────────
  if(nuevoEstado==='Pagado' && estadoAnterior!=='Pagado') {
    if(!DB.pagado) DB.pagado=[];
    const c=DB.cobros.find(x=>x.id===id);
    DB.pagado.push({...c, estado:'Pagado', fecha_pago:new Date().toISOString().slice(0,10)});
    DB.cobros=DB.cobros.filter(x=>x.id!==id);
    saveDB();closeModal();cobros();
    toast('✅ Movido a Pagado');
    return;
  }

  // ── Restaurar a Inmuebles si se cancela ───────────────────────────────────
  if(nuevoEstado==='Cancelado' && estadoAnterior!=='Cancelado') {
    const yaEnInmuebles=DB.inmuebles.some(i=>i.ref===ref);
    if(!yaEnInmuebles) {
      // Reconstruir el inmueble con los datos que conserva el cobro
      const c=DB.cobros.find(x=>x.id===id);
      DB.inmuebles.push({
        id:newId('inmuebles'), ref, estado:'En Activo',
        prop_nombre:c.prop_nombre||c.nombre||'', prop_apellidos:c.prop_apellidos||c.apellidos||'',
        telefono:c.telefono||'', email:c.email||'', nif:c.nif||'',
        dir_prop:c.dir_prop||'', loc_prop:c.loc_prop||'', prov_prop:c.prov_prop||'',
        tipologia:c.tipologia||'',
        dir_inm:c.dir_inm||c.dir||'', loc_inm:c.loc_inm||c.localidad||'',
        cp_inm:c.cp_inm||'', prov_inm:c.prov_inm||'',
        m2:c.m2||'', dorm:c.dorm||'', banos:c.banos||'',
        ascensor:c.ascensor||'No', calef:c.calef||'No', terraza:c.terraza||'No', m2t:c.m2t||'',
        trastero:c.trastero||'No', garaje:c.garaje||'No',
        luz:c.luz||'', agua:c.agua||'', gas:c.gas||'No',
        vpo:c.vpo||'No', captacion:c.captacion||'Exclusiva',
        ref_cat:c.ref_cat||'', ibi:c.ibi||'', comunidad:c.comunidad||'',
        obs:c.obs||''
      });
      // Eliminar de cobros
      DB.cobros=DB.cobros.filter(x=>x.id!==id);
      saveDB();closeModal();inmuebles();
      toast('🔄 Cancelado · Inmueble restaurado en Activo');
      return;
    }
  }
  saveDB();closeModal();cobros();toast(id?'Cobro actualizado ✓':'Cobro creado ✓');
}

function modalExtra(id) {
  const d=id?(DB.extras||[]).find(x=>x.id===id):{};
  const v=k=>d[k]||'';
  const avs=d.avances||[];

  // Buscar inmueble por código
  const codigo=d.codigo||'';
  const inm=codigo?([...DB.inmuebles,...(DB.cobros||[]),...(DB.pagado||[])].find(x=>x.ref===codigo)):null;

  function infoInmueble(cod) {
    const i=[...DB.inmuebles,...(DB.cobros||[]),...(DB.pagado||[])].find(x=>x.ref===cod);
    if(!i) return '<span style="color:var(--text3);font-size:12px">No se encontró ningún inmueble con este código.</span>';
    const hp=(DB.historial_precios||[]).find(h=>h.ref===cod);
    let precioStr='-';
    if(hp&&hp.cambios.length){
      const ult=[...hp.cambios].sort((a,b)=>a.fecha>b.fecha?1:-1).pop();
      precioStr=`${fmtP(ult.propietario+ult.innova)} (${fmtFecha(ult.fecha)})`;
    }
    const contrato=(DB.contratos||[]).find(c=>c.ref===cod);
    let vencStr='-';
    if(contrato&&contrato.periodos.length){
      const ps=contrato.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
      const ult=ps[ps.length-1];
      if(ult){
        const dias=Math.round((new Date(ult.fin)-new Date())/(1000*60*60*24));
        vencStr=`${fmtFecha(ult.fin)} · ${dias<0?'Vencido':dias+'d restantes'}`;
      }
    }
    const nombre=i.prop_nombre||i.nombre||'';
    const apellidos=i.prop_apellidos||i.apellidos||'';
    const dir=i.dir_inm||i.dir||'-';
    const loc=i.loc_inm||i.localidad||'-';

function pagado() {

    const q=busq.toLowerCase();
    if(q) data=data.filter(c=>(c.ref+c.nombre+c.apellidos+c.localidad).toLowerCase().includes(q));
    data.sort((a,b)=>b.fecha_pago>a.fecha_pago?1:-1);
    const totalHon=data.reduce((a,c)=>a+parseFloat((c.innova*0.40).toFixed(2)),0);
    const totalBase=data.reduce((a,c)=>a+parseFloat(((c.innova*0.40)/1.21).toFixed(2)),0);
    const totalIva=data.reduce((a,c)=>a+parseFloat((((c.innova*0.40)/1.21)*0.21).toFixed(2)),0);
    const totalIrpf=data.reduce((a,c)=>a+parseFloat((((c.innova*0.40)/1.21)*0.07).toFixed(2)),0);
    const totalTotal=data.reduce((a,c)=>{const b=parseFloat(((c.innova*0.40)/1.21).toFixed(2));return a+parseFloat((b+b*0.21-b*0.07).toFixed(2));},0);

        <tbody>${data.length?data.map(c=>{
          const hon=parseFloat((c.innova*0.40).toFixed(2));
          const base=parseFloat((hon/1.21).toFixed(2));
          const iva=parseFloat((base*0.21).toFixed(2));

          <td class="td-ref" style="font-size:14px;font-weight:700">${c.ref}</td>

          <td class="num-right td-muted">${fmtP(c.innova)}</td>

function devolverPagado(id){
  const c=DB.pagado.find(x=>x.id===id); if(!c) return;
  const destino=document.getElementById('dp-estado').value;
  const [bloque, estadoKey]=destino.split('_');
  const estadoMap={'Reservado':'Reservado','Vendido':'Vendido','Pendiente':'Pendiente','Cancelado':'Cancelado','EnActivo':'En Activo','Baja':'Baja'};
  const estado=estadoMap[estadoKey];

  if(bloque==='Ventas'){
    if(!DB.ventas) DB.ventas=[];
    const yaExiste=DB.ventas.some(x=>x.ref===c.ref);
    if(yaExiste){ toast('Ya existe una venta con esa referencia'); return; }
    const {fecha_pago,...resto}=c;
    DB.ventas.push({...resto, id:newId('ventas'), estado:'Vendido'});
    DB.pagado=DB.pagado.filter(x=>x.id!==id);
    saveDB();closeModal();ventas();
    toast('↩️ Devuelto a Ventas');

  } else if(bloque==='Cobros'){
    if(!DB.cobros) DB.cobros=[];
    const yaExiste=DB.cobros.some(x=>x.ref===c.ref);
    if(yaExiste){ toast('Ya existe un cobro con esa referencia'); return; }
    const {fecha_pago,...resto}=c;
    DB.cobros.push({...resto, id:newId('cobros'), estado});
    DB.pagado=DB.pagado.filter(x=>x.id!==id);
    saveDB();closeModal();cobros();
    toast('↩️ Devuelto a Cobros Pendientes — '+estado);

  } else {
    if(!DB.inmuebles) DB.inmuebles=[];
    const yaExiste=DB.inmuebles.some(x=>x.ref===c.ref);
    if(yaExiste){ toast('Ya existe un inmueble con esa referencia'); return; }
    DB.inmuebles.push({
      id:newId('inmuebles'), ref:c.ref, estado,
      prop_nombre:c.nombre, prop_apellidos:c.apellidos,
      dir_inm:c.dir, loc_inm:c.localidad,
      tipologia:'', m2:'', dorm:'', banos:'',
      ascensor:'No', calef:'No', terraza:'No', m2t:'',
      trastero:'No', garaje:'No', luz:'', agua:'', gas:'No',
      vpo:'No', captacion:'Exclusiva',
      telefono:'', email:'', nif:'',
      dir_prop:'', loc_prop:'', prov_prop:'',
      prov_inm:c?.prov_inm||'', ref_cat:c?.ref_cat||'', ibi:c?.ibi||'', comunidad:c?.comunidad||'', obs:c?.obs||''
    });
    DB.pagado=DB.pagado.filter(x=>x.id!==id);
    saveDB();closeModal();inmuebles();
    toast('↩️ Devuelto a Inmuebles — '+estado);
  }
}

function eliminarPagado(id){
  if(!confirm('¿Eliminar este registro de Pagado? Esta acción no se puede deshacer.'))return;
  DB.pagado=DB.pagado.filter(x=>x.id!==id);
  saveDB();pagado();toast('Registro eliminado');
}


function contratos() {
  let busq='', filtroV='todos';
  const today = new Date(); today.setHours(0,0,0,0);
  if(!DB.contratos) DB.contratos=[];

  function dias(fin){ return Math.round((new Date(fin)-today)/(1000*60*60*24)); }
  function vencEstado(d){
    if(d<0) return {label:'Vencido',cls:'b-rojo'};
    if(d<=30) return {label:'Urgente (≤30d)',cls:'b-rojo'};
    if(d<=60) return {label:'Próximo (≤60d)',cls:'b-naranja'};
    return {label:'Vigente',cls:'b-verde'};
  }
  function getRows(){
    return DB.contratos.map(c=>{
      const inm=DB.inmuebles.find(i=>i.ref===c.ref)||DB.cobros.find(i=>i.ref===c.ref);
      const ps=c.periodos.filter(p=>p.fin).sort((a,b)=>a.fin>b.fin?1:-1);
      const actual=ps[ps.length-1];
      if(!actual) return null;
      const d=dias(actual.fin);
      return {id:c.id,ref:c.ref,periodos:ps,finActual:actual.fin,inicioActual:actual.inicio,mesesActual:actual.meses,d,estado:vencEstado(d),
        prop:inm?(inm.prop_nombre||inm.nombre||'')+' '+(inm.prop_apellidos||inm.apellidos||''):'-',
        loc:inm?(inm.loc_inm||inm.localidad||''):'-',tel:inm?(inm.telefono||''):'-'};
    }).filter(Boolean);
  }

  function render(){
    let rows=getRows();
    const q=busq.toLowerCase();
    if(q) rows=rows.filter(r=>(r.ref+r.prop+r.loc).toLowerCase().includes(q));
    if(filtroV==='vencido') rows=rows.filter(r=>r.d<0);
    else if(filtroV==='urgente') rows=rows.filter(r=>r.d>=0&&r.d<=30);
    else if(filtroV==='proximo') rows=rows.filter(r=>r.d>30&&r.d<=60);
    else if(filtroV==='vigente') rows=rows.filter(r=>r.d>60);
    rows.sort((a,b)=>a.d-b.d);
    const all=getRows();
    const vencidos=all.filter(r=>r.d<0).length, urgentes=all.filter(r=>r.d>=0&&r.d<=30).length;
    document.getElementById('main').innerHTML=`
      <div class="page-header">
        <div><div class="page-title">📅 Vencimientos de contrato</div>
        <div class="page-subtitle">${DB.contratos.length} contratos · <span style="color:#a32d2d;font-weight:600">${vencidos} vencidos</span> · <span style="color:#854f0b;font-weight:600">${urgentes} urgentes</span></div></div>
        <button class="btn btn-primary" onclick="modalContrato()">+ Nuevo contrato</button>
      </div>
      <div class="filters">
        <input class="filter-input" placeholder="🔍 Buscar referencia, propietario..." oninput="window._bc(this.value)"/>
        <select class="filter-select" onchange="window._bvc(this.value)">
          <option value="todos">Todos</option><option value="vencido">Vencidos</option>
          <option value="urgente">Urgentes (≤30d)</option><option value="proximo">Próximos (≤60d)</option>
          <option value="vigente">Vigentes</option>
        </select>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Referencia</th><th>Propietario</th><th>Teléfono</th><th>Localidad</th><th>Inicio actual</th><th>Fin contrato</th><th>Meses</th><th>Días restantes</th><th>Estado</th><th>Renovaciones</th><th>Acciones</th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td class="td-ref" style="font-size:14px;font-weight:700">${r.ref}</td>
          <td class="td-name">${r.prop}</td>
          <td class="td-muted">${r.tel||'-'}</td>
          <td class="td-muted">${r.loc||'-'}</td>
          <td class="td-muted">${r.inicioActual||'-'}</td>
          <td style="font-weight:600">${fmtFecha(r.finActual)}</td>
          <td class="td-muted">${r.mesesActual||'-'} m.</td>
          <td style="font-weight:700;color:${r.d<0?'#a32d2d':r.d<=30?'#a32d2d':r.d<=60?'#854f0b':'#3b6d11'}">${r.d<0?'Vencido hace '+Math.abs(r.d)+'d':r.d+' días'}</td>
          <td><span class="badge ${r.estado.cls}">${r.estado.label}</span></td>
          <td style="font-size:11px;color:var(--text3)">${r.periodos.map((p,i)=>`<span style="white-space:nowrap">${i+1}. ${fmtFecha(p.inicio)||'?'} → ${fmtFecha(p.fin)} (${p.meses||'?'}m)</span>`).join('<br/>')}</td>
          <td><div class="td-actions">
            <button class="btn btn-secondary btn-sm btn-icon" onclick="modalContrato(${r.id})">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="eliminarContrato(${r.id})">🗑️</button>
          </div></td>
        </tr>`).join(''):`<tr><td colspan="11"><div class="empty-state"><div class="empty-icon">📅</div><div>No hay contratos. Pulsa "+ Nuevo contrato" para añadir.</div></div></td></tr>`}
        </tbody>
      </table></div>`;
    window._bc=v=>{busq=v;render();restoreFocus('.filter-input',v)};
    window._bvc=v=>{filtroV=v;render()};
  }
  render();
}

function modalContrato(id){
  const c=id?DB.contratos.find(x=>x.id===id):{};
  const periodos=c.periodos||[];
  const refsDisp=[...new Set([...DB.inmuebles.map(i=>i.ref),...DB.cobros.map(i=>i.ref),...DB.contratos.map(i=>i.ref)])].sort();
  openModal(`
    <div class="modal-title">${id?'Editar contrato':'Nuevo contrato'}</div>
    <div class="field">
      <label>Referencia del activo *</label>
      <input id="fc-ref" list="fc-ref-list" value="${c.ref||''}" placeholder="Ej: F 581"/>
      <datalist id="fc-ref-list">${refsDisp.map(r=>`<option value="${r}">`).join('')}</datalist>
    </div>
    <hr class="section-sep"/><div class="section-label">Periodos del contrato</div>
